<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baretraks — We'll Be Right Back</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-base:#1a1612;--bg-card:#231e18;--border:#3a3226;--border-light:#2a2520;
  --text:#d4c8b0;--text-bright:#e8d5a3;--text-dim:#8a7e6b;--text-muted:#6b6050;
  --accent:#b48c3c;--accent-hover:#c99d48;--error:#e07050;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg-base);color:var(--text);overflow:hidden}
body{display:flex;align-items:center;justify-content:center;position:relative}

/* Atmospheric background — subtle bokeh lights */
.atmosphere{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.bokeh{position:absolute;border-radius:50%;filter:blur(60px);opacity:.08;animation:drift 20s ease-in-out infinite alternate}
.bokeh:nth-child(1){width:340px;height:340px;background:radial-gradient(circle,#b48c3c,transparent 70%);top:-80px;left:10%;animation-delay:0s}
.bokeh:nth-child(2){width:280px;height:280px;background:radial-gradient(circle,#e07050,transparent 70%);bottom:-60px;right:5%;animation-delay:-7s}
.bokeh:nth-child(3){width:220px;height:220px;background:radial-gradient(circle,#7eb8da,transparent 70%);top:40%;left:60%;animation-delay:-13s}
@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(30px,-20px) scale(1.1)}}

/* Grain overlay */
.grain{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.card{position:relative;z-index:2;text-align:center;max-width:480px;width:90%;
  background:var(--bg-card);border:1px solid var(--border);border-radius:16px;
  padding:48px 40px;backdrop-filter:blur(12px);
  box-shadow:0 8px 48px rgba(0,0,0,.4)}

.logo{width:100px;height:100px;margin-bottom:24px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}

h1{font-family:'Playfair Display',serif;font-weight:700;font-size:1.75rem;
  color:var(--text-bright);margin-bottom:12px;line-height:1.3}

.divider{width:60px;height:2px;background:var(--accent);margin:0 auto 20px;border-radius:1px}

.message{font-size:.95rem;line-height:1.6;color:var(--text);margin-bottom:24px}

.error-code{display:inline-block;font-size:.8rem;font-weight:600;color:var(--text-muted);
  background:var(--bg-base);border:1px solid var(--border-light);border-radius:6px;
  padding:6px 14px;letter-spacing:.5px;margin-bottom:24px}

.btn{display:inline-block;padding:12px 28px;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:600;
  color:var(--bg-base);background:var(--accent);border:none;border-radius:8px;cursor:pointer;
  text-decoration:none;transition:background .2s,transform .15s}
.btn:hover{background:var(--accent-hover);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}

.tagline{margin-top:28px;font-size:.75rem;color:var(--text-muted);letter-spacing:.3px}

/* Pulse on the logo */
@keyframes pulse-ring{0%,100%{box-shadow:0 0 0 0 rgba(180,140,60,.25)}50%{box-shadow:0 0 0 14px rgba(180,140,60,0)}}
.logo-wrap{display:inline-block;border-radius:50%;animation:pulse-ring 3s ease-in-out infinite}

@media(max-width:480px){
  .card{padding:36px 24px}
  h1{font-size:1.4rem}
  .logo{width:80px;height:80px}
}
</style>
</head>
