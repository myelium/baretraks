<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/static/favicon.png">
<title>Baretraks</title>
<script src="https://www.youtube.com/iframe_api"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1a1612;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(180,140,60,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(120,80,30,0.05) 0%, transparent 60%);
    color: #d4c8b0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
  }

  #app { width: 100%; max-width: 800px; transition: max-width 0.3s; }
  #app.wide { max-width: 1000px; }

  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 8px;
  }
  .logo {
    width: 180px;
    height: auto;
    margin-bottom: 16px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
  }
  h1 {
    text-align: center;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 2rem;
    margin-bottom: 8px;
    color: #e8d5a3;
    letter-spacing: 0.02em;
  }
  .subtitle {
    text-align: center;
    color: #8a7e6b;
    margin-bottom: 24px;
    font-size: 0.95rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* --- Nav --- */
  .nav {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
  }
  .nav-btn {
    padding: 8px 24px;
    border-radius: 20px;
    border: 1px solid #4a3f2f;
    background: transparent;
    color: #8a7e6b;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .nav-btn.active { background: #b48c3c; border-color: #b48c3c; color: #1a1612; }
  .nav-btn:hover:not(.active) { border-color: #b48c3c; color: #d4c8b0; }

  /* --- Card --- */
  .card {
    background: #231e18;
    border-radius: 16px;
    padding: 32px;
    border: 1px solid #3a3226;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.03);
  }

  .input-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }

  .mode-row {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 0 4px;
    flex-wrap: wrap;
  }

  .mode-row label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    color: #c0b090;
  }

  .mode-row input[type="radio"] {
    accent-color: #b48c3c;
    width: 16px;
    height: 16px;
    cursor: pointer;
  }

  .mode-row select {
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid #4a3f2f;
    background: #1a1612;
    color: #e8d5a3;
    font-size: 0.85rem;
    font-family: inherit;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .mode-row select:focus { border-color: #b48c3c; }

  .lang-picker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-left: 4px;
  }
  .lang-picker select {
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid #4a3f2f;
    background: #1a1612;
    color: #e8d5a3;
    font-size: 0.85rem;
    font-family: inherit;
    outline: none;
    cursor: pointer;
  }
  .lang-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .lang-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 16px;
    background: #3a3226;
    color: #e8d5a3;
    font-size: 0.82rem;
    font-weight: 500;
    border: 1px solid #4a3f35;
  }
  .lang-chip-remove {
    background: none;
    border: none;
    color: #8a7e6b;
    cursor: pointer;
    font-size: 1rem;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.2s;
  }
  .lang-chip-remove:hover { color: #e07050; }

  input[type="text"] {
    flex: 1;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid #4a3f2f;
    background: #1a1612;
    color: #e8d5a3;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  input[type="text"]::placeholder { color: #6b6050; }
  input[type="text"]:focus { border-color: #b48c3c; box-shadow: 0 0 0 2px rgba(180,140,60,0.15); }

  button {
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    font-size: 1rem;
    cursor: pointer;
    font-weight: 600;
    font-family: inherit;
    transition: background 0.2s, transform 0.1s;
  }
  button:active { transform: scale(0.97); }

  .btn-primary { background: #b48c3c; color: #1a1612; }
  .btn-primary:hover { background: #c99d48; }
  .btn-primary:disabled { background: #4a3f2f; color: #6b6050; cursor: not-allowed; }

  .btn-secondary { background: #3a3226; color: #d4c8b0; }
  .btn-secondary:hover { background: #4a3f2f; }

  .btn-download {
    background: linear-gradient(135deg, #b48c3c, #8a6a20);
    color: #1a1612;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.9rem;
    transition: opacity 0.2s;
  }
  .btn-download:hover { opacity: 0.9; }

  /* --- Progress State --- */
  .overall-bar-container { margin-bottom: 24px; }
  .overall-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 0.9rem;
    color: #8a7e6b;
  }
  .overall-bar {
    height: 8px;
    background: #2e2720;
    border-radius: 4px;
    overflow: hidden;
  }
  .overall-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #8a6a20, #c99d48, #e8d5a3);
    border-radius: 4px;
    transition: width 0.5s ease;
    width: 0%;
  }

  .steps { display: flex; flex-direction: column; gap: 12px; }

  .step {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 16px;
    background: #1a1612;
    border-radius: 10px;
    border: 1px solid #3a3226;
  }

  .step-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
    flex-shrink: 0;
    border: 2px solid #4a3f2f;
    color: #6b6050;
    background: transparent;
  }
  .step.done .step-icon { background: #7a8a3c; border-color: #7a8a3c; color: #1a1612; }
  .step.active .step-icon { background: #b48c3c; border-color: #b48c3c; color: #1a1612; animation: pulse 1.5s infinite; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(180,140,60,0.35); }
    50% { box-shadow: 0 0 0 8px rgba(180,140,60,0); }
  }

  .step-body { flex: 1; min-width: 0; }
  .step-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; color: #d4c8b0; }
  .step.pending .step-title { color: #6b6050; }

  .step-bar {
    height: 4px;
    background: #2e2720;
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 4px;
  }
  .step-bar-fill {
    height: 100%;
    background: #b48c3c;
    border-radius: 2px;
    transition: width 0.5s ease;
  }
  .step.done .step-bar-fill { background: #7a8a3c; }

  .step-time { font-size: 0.8rem; color: #8a7e6b; }

  /* --- Two-column processing layout --- */
  .processing-columns {
    display: grid;
    grid-template-columns: 1fr 260px;
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 700px) {
    .processing-columns { grid-template-columns: 1fr; }
  }
  .processing-left { min-width: 0; }
  .processing-right {
    background: #1a1612;
    border: 1px solid #3a3226;
    border-radius: 12px;
    padding: 16px;
    position: sticky;
    top: 20px;
  }
  .output-heading {
    font-family: inherit;
    font-size: 1rem;
    color: #e8d5a3;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid #3a3226;
  }
  .output-files {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .output-placeholder {
    color: #6b6050;
    font-size: 0.85rem;
    font-style: italic;
  }
  .output-file {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: #231e18;
    border: 1px solid #3a3226;
    border-radius: 8px;
    text-decoration: none;
    color: #d4c8b0;
    font-size: 0.85rem;
    transition: border-color 0.2s, background 0.2s;
  }
  .output-file:hover {
    border-color: #b48c3c;
    background: rgba(180,140,60,0.08);
  }
  .output-file-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: #2e2720;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: #b48c3c;
    font-weight: 700;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  .output-file-name {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .output-file-step {
    font-size: 0.7rem;
    color: #6b6050;
    white-space: nowrap;
  }

  .close-note {
    text-align: center;
    margin-top: 20px;
    color: #6b6050;
    font-size: 0.85rem;
    font-style: italic;
  }

  /* --- Done State: Media Player --- */
  .player-title {
    text-align: center;
    font-size: 1.2rem;
    font-weight: 600;
    color: #e8d5a3;
    margin-bottom: 16px;
  }
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
  }
  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    background: #1a1612;
    border: 1px solid #3a3226;
    border-radius: 10px 10px 0 0;
    cursor: pointer;
    color: #8a7e6b;
    font-weight: 600;
    font-size: 0.9rem;
    transition: background 0.2s, color 0.2s;
  }
  .tab.active { background: #231e18; color: #e8d5a3; border-bottom-color: #231e18; }
  .tab:hover { color: #d4c8b0; }
  .tab-icon {
    width: 16px;
    height: 16px;
    vertical-align: -2px;
    margin-right: 6px;
    display: inline-block;
  }

  .player-area {
    background: #231e18;
    border: 1px solid #3a3226;
    border-top: none;
    border-radius: 0 0 14px 14px;
    padding: 20px;
  }

  video, audio { width: 100%; border-radius: 10px; outline: none; }
  video { background: #0e0c09; }
  audio { margin: 20px 0; }

  /* --- Video container with vocal toggle --- */
  .video-container { position: relative; }

  .yt-player-container {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%; /* 16:9 aspect ratio */
    background: #000;
    border-radius: 8px;
    overflow: hidden;
  }
  .yt-player-container iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: 0;
  }
  .subtitle-overlay {
    position: absolute;
    bottom: 60px;
    left: 0;
    width: 100%;
    text-align: center;
    pointer-events: none;
    z-index: 10;
    font-size: 1.3em;
    font-weight: 600;
    color: #fff;
    text-shadow: 0 0 4px #000, 0 0 8px #000, 1px 1px 2px #000;
    padding: 0 20px;
    line-height: 1.4;
  }
  .subtitle-controls {
    position: absolute;
    bottom: 8px;
    right: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(26,22,18,0.85);
    backdrop-filter: blur(6px);
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid rgba(74,63,47,0.6);
    z-index: 10;
  }
  .yt-fullscreen-btn {
    background: none;
    border: none;
    color: #d4c8b0;
    cursor: pointer;
    padding: 2px;
    display: flex;
    align-items: center;
    margin-left: 4px;
    opacity: 0.8;
    transition: opacity 0.2s;
  }
  .yt-fullscreen-btn:hover { opacity: 1; }

  /* Fullscreen: make container fill screen, enlarge subtitles */
  .yt-player-container:fullscreen {
    padding-bottom: 0;
    width: 100vw;
    height: 100vh;
    background: #000;
  }
  .yt-player-container:fullscreen iframe {
    width: 100%;
    height: 100%;
  }
  .yt-player-container:fullscreen .subtitle-overlay {
    font-size: 2.2em;
    bottom: 80px;
  }
  .yt-player-container:fullscreen .subtitle-controls {
    bottom: 16px;
    right: 20px;
  }
  .vocal-toggle {
    position: absolute;
    bottom: 56px;
    right: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(26,22,18,0.85);
    backdrop-filter: blur(6px);
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid rgba(74,63,47,0.6);
    z-index: 10;
  }
  .toggle-label {
    font-size: 0.8rem;
    font-weight: 600;
    color: #d4c8b0;
  }
  .toggle-switch {
    position: relative;
    display: inline-block;
    width: 36px;
    height: 20px;
    cursor: pointer;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: #3a3226;
    border-radius: 20px;
    transition: background 0.25s;
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    left: 3px;
    bottom: 3px;
    background: #8a7e6b;
    border-radius: 50%;
    transition: transform 0.25s, background 0.25s;
  }
  .toggle-switch input:checked + .toggle-slider { background: #b48c3c; }
  .toggle-switch input:checked + .toggle-slider::before {
    transform: translateX(16px);
    background: #1a1612;
  }

  /* --- Lyrics Panel --- */
  .lyrics-panel {
    margin-top: 16px;
    background: #1a1612;
    border: 1px solid #3a3226;
    border-radius: 12px;
    padding: 20px;
    max-height: 300px;
    overflow-y: auto;
    scroll-behavior: smooth;
    text-align: center;
    line-height: 2.2;
  }

  .lyrics-line { margin-bottom: 4px; transition: opacity 0.3s; }
  .lyrics-line.past { opacity: 0.35; }

  .lyrics-word {
    display: inline;
    padding: 2px 5px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
    font-size: 1.1rem;
    color: #d4c8b0;
  }
  .lyrics-word.active {
    color: #ffd700;
    background: rgba(180,140,60,0.2);
    font-weight: 700;
  }
  .lyrics-word.sung { color: #6b6050; }

  /* --- Downloads --- */
  .downloads {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* --- Library --- */
  .library-layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 700px) {
    .library-layout { grid-template-columns: 1fr; }
  }

  .library-sidebar {
    background: #231e18;
    border: 1px solid #3a3226;
    border-radius: 12px;
    padding: 16px;
    position: sticky;
    top: 20px;
  }
  .filter-section { margin-bottom: 16px; }
  .filter-section:last-child { margin-bottom: 0; }
  .filter-heading {
    font-size: 0.75rem;
    font-weight: 700;
    color: #8a7e6b;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .filter-search {
    width: 100%;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid #3a3226;
    background: #1a1612;
    color: #d4c8b0;
    font-size: 0.85rem;
    font-family: inherit;
    outline: none;
  }
  .filter-search::placeholder { color: #6b6050; }
  .filter-search:focus { border-color: #b48c3c; }
  .filter-options {
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-height: 180px;
    overflow-y: auto;
  }
  .filter-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    color: #d4c8b0;
    transition: background 0.15s;
  }
  .filter-option:hover { background: rgba(180,140,60,0.08); }
  .filter-option.active { background: rgba(180,140,60,0.15); color: #e8d5a3; }
  .filter-option input[type="checkbox"] { display: none; }
  .filter-check {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid #4a3f2f;
    background: #1a1612;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .filter-option.active .filter-check {
    background: #b48c3c;
    border-color: #b48c3c;
  }
  .filter-option.active .filter-check::after {
    content: '';
    width: 6px;
    height: 6px;
    background: #1a1612;
    border-radius: 1px;
  }
  .filter-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .filter-count {
    font-size: 0.75rem;
    color: #6b6050;
    flex-shrink: 0;
  }
  .filter-clear {
    font-size: 0.75rem;
    color: #b48c3c;
    cursor: pointer;
    text-decoration: none;
    margin-top: 8px;
    display: inline-block;
  }
  .filter-clear:hover { text-decoration: underline; }

  .library-main {}
  .library-results-count {
    font-size: 0.85rem;
    color: #8a7e6b;
    margin-bottom: 12px;
  }
  .library-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .library-item {
    background: #231e18;
    border: 1px solid #3a3226;
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
  }
  .library-item:hover {
    border-color: #b48c3c;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }

  .library-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    background: #1a1612;
    display: block;
  }

  .library-info {
    padding: 12px;
  }
  .library-info h3 {
    font-size: 0.9rem;
    font-weight: 600;
    color: #e8d5a3;
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .library-info .meta {
    font-size: 0.8rem;
    color: #6b6050;
  }
  .library-info .channel {
    font-size: 0.8rem;
    color: #8a7e6b;
    margin-bottom: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .library-item-header {
    position: relative;
  }

  .library-mode-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 600;
    background: rgba(26,22,18,0.85);
    backdrop-filter: blur(4px);
    color: #d4c8b0;
    border: 1px solid rgba(74,63,47,0.5);
  }
  .library-mode-badge.subtitled { color: #7eb8da; border-color: rgba(126,184,218,0.4); }
  .library-mode-badge.karaoke { color: #d4a84b; border-color: rgba(212,168,75,0.4); }

  .library-delete-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 28px;
    height: 28px;
    padding: 0;
    border-radius: 50%;
    border: 1px solid rgba(74,63,47,0.5);
    background: rgba(26,22,18,0.85);
    backdrop-filter: blur(4px);
    color: #8a7e6b;
    font-size: 0.85rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;

<script>
const STEP_NAMES_KARAOKE = ['Downloading', 'Separating vocals', 'Transcribing lyrics', 'Building subtitles', 'Composing video'];
const STEP_NAMES_SUBTITLED = ['Downloading audio', 'Transcribing', 'Translating'];
let STEP_NAMES = STEP_NAMES_KARAOKE;
let pollInterval = null;
let currentJob = null;
let lyricsData = null;
let activeMediaEl = null;
let currentPage = 'generator';

// ---- Page navigation ----

function stopAllMedia() {
  if (activeMediaEl) {
    activeMediaEl.pause();
    activeMediaEl.removeEventListener('timeupdate', onTimeUpdate);
    activeMediaEl.removeEventListener('play', onMediaPlay);
    activeMediaEl.removeEventListener('pause', onMediaPause);
    activeMediaEl.removeEventListener('seeked', onMediaSeeked);
    activeMediaEl.src = '';
    activeMediaEl = null;
  }
  if (typeof destroyVocalsSync === 'function') destroyVocalsSync();
  if (typeof destroyYtPlayer === 'function') destroyYtPlayer();
}

function showPage(page) {
  stopAllMedia();
  destroyYtPlayer();
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.page === page);
  });
  document.getElementById('page-generator').classList.toggle('hidden', page !== 'generator');
  document.getElementById('page-library').classList.toggle('hidden', page !== 'library');
  document.getElementById('app').classList.toggle('wide', page === 'library');

  if (page === 'generator') showState('idle');
  if (page === 'library') loadLibrary();
}

// ---- State management ----

function showState(state) {
  stopAllMedia();
  ['idle', 'processing', 'done', 'error'].forEach(s => {
    document.getElementById('state-' + s).classList.toggle('hidden', s !== state);
  });
  document.getElementById('app').classList.toggle('wide',
    state === 'processing' || currentPage === 'library');
}

function startNew() {
  stopAllMedia();
  currentJob = null;
  lyricsData = null;
  // Reset inline player
  document.getElementById('inline-player').classList.add('hidden');
  document.getElementById('close-note').classList.remove('hidden');
  document.getElementById('url-input').value = '';
  showState('idle');
}

// ---- Mode & Language Selection ----

const LANG_NAMES_ALL = {af:'Afrikaans',sq:'Albanian',am:'Amharic',ar:'Arabic',hy:'Armenian',as:'Assamese',az:'Azerbaijani',ba:'Bashkir',eu:'Basque',be:'Belarusian',bn:'Bengali',bs:'Bosnian',br:'Breton',bg:'Bulgarian',my:'Burmese',yue:'Cantonese',ca:'Catalan',hr:'Croatian',cs:'Czech',da:'Danish',nl:'Dutch',en:'English',et:'Estonian',fo:'Faroese',fi:'Finnish',fr:'French',gl:'Galician',ka:'Georgian',de:'German',el:'Greek',gu:'Gujarati',ht:'Haitian',ha:'Hausa',haw:'Hawaiian',he:'Hebrew',hi:'Hindi',hu:'Hungarian',is:'Icelandic',id:'Indonesian',it:'Italian',ja:'Japanese',jw:'Javanese',kn:'Kannada',kk:'Kazakh',km:'Khmer',ko:'Korean',lo:'Lao',la:'Latin',lv:'Latvian',ln:'Lingala',lt:'Lithuanian',lb:'Luxembourgish',mk:'Macedonian',mg:'Malagasy',ms:'Malay',ml:'Malayalam',mt:'Maltese',zh:'Mandarin Chinese',mi:'Maori',mr:'Marathi',mn:'Mongolian',ne:'Nepali',no:'Norwegian',nn:'Norwegian Nynorsk',oc:'Occitan',ps:'Pashto',fa:'Persian',pl:'Polish',pt:'Portuguese',pa:'Punjabi',ro:'Romanian',ru:'Russian',sa:'Sanskrit',sr:'Serbian',sn:'Shona',sd:'Sindhi',si:'Sinhala',sk:'Slovak',sl:'Slovenian',so:'Somali',es:'Spanish',su:'Sundanese',sw:'Swahili',sv:'Swedish',tl:'Tagalog',tg:'Tajik',ta:'Tamil',tt:'Tatar',te:'Telugu',th:'Thai',bo:'Tibetan',tr:'Turkish',tk:'Turkmen',uk:'Ukrainian',ur:'Urdu',uz:'Uzbek',vi:'Vietnamese',cy:'Welsh',yi:'Yiddish',yo:'Yoruba'};

let selectedLanguages = [];
const MAX_LANGUAGES = 3;

function getSelectedMode() {
  const radio = document.querySelector('input[name="mode"]:checked');
  return radio ? radio.value : 'karaoke';
}

function onModeChange() {
  const mode = getSelectedMode();
  document.getElementById('lang-picker').style.display = mode === 'subtitled' ? 'inline-flex' : 'none';
}

function addLanguage(code) {
  if (!code || selectedLanguages.includes(code) || selectedLanguages.length >= MAX_LANGUAGES) return;
  selectedLanguages.push(code);
  renderLangChips();
}

function removeLanguage(code) {
  selectedLanguages = selectedLanguages.filter(c => c !== code);
  renderLangChips();
}

function renderLangChips() {
  const container = document.getElementById('lang-chips');
  const addSelect = document.getElementById('lang-add-select');
  container.innerHTML = selectedLanguages.map(code =>
    `<span class="lang-chip">${LANG_NAMES_ALL[code] || code}<button class="lang-chip-remove" onclick="removeLanguage('${code}')">&times;</button></span>`
  ).join('');
  addSelect.style.display = selectedLanguages.length >= MAX_LANGUAGES ? 'none' : '';
}

// ---- Submit Job ----

async function submitJob(skipDuplicateCheck = false) {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;
  if (!/youtube\.com\/watch|youtu\.be\//.test(url)) {
    alert('Please enter a valid YouTube URL');
    return;
  }

  const mode = getSelectedMode();
  const languages = mode === 'subtitled' ? [...selectedLanguages] : [];

  if (mode === 'subtitled' && languages.length === 0) {
    alert('Please add at least one subtitle language.');
    return;
  }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = 'Checking...';

  try {
    // Check if this URL already exists in the library for this mode
    if (!skipDuplicateCheck) {
      const checkResp = await fetch(`/api/library/check-url?url=${encodeURIComponent(url)}&mode=${mode}`);
      if (checkResp.ok) {
        const checkData = await checkResp.json();
        if (checkData.found) {
          btn.disabled = false;
          btn.textContent = 'Generate';
          showDuplicateDialog(checkData.item);
          return;
        }
      }
    }

    // Set mode-aware step names
    STEP_NAMES = mode === 'subtitled' ? STEP_NAMES_SUBTITLED : STEP_NAMES_KARAOKE;

    btn.textContent = 'Submitting...';
    const body = { url, mode };
    if (languages.length > 0) body.languages = languages;
    const resp = await fetch('/api/jobs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (resp.status === 409) {
      alert('A job is already running. Please wait for it to finish.');
      return;
    }
    if (!resp.ok) throw new Error('Failed to start job');
    const data = await resp.json();
    currentJob = data.job;
    showProcessing();
  } catch (e) {
    alert('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate';
  }
}

function showDuplicateDialog(item) {
  // Remove any existing dialog
  const existing = document.getElementById('duplicate-dialog-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'duplicate-dialog-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:1000;';

  const dialog = document.createElement('div');
  dialog.style.cssText = 'background:#2a2520;border:1px solid #4a3f35;border-radius:12px;padding:28px;max-width:420px;width:90%;color:#e8dcc8;font-family:inherit;box-shadow:0 8px 32px rgba(0,0,0,0.4);';

  const thumbHtml = item.thumbnail
    ? `<img src="${item.thumbnail}" style="width:100%;border-radius:8px;margin-bottom:16px;aspect-ratio:16/9;object-fit:cover;" />`
    : '';

  dialog.innerHTML = `
    ${thumbHtml}
    <h3 style="margin:0 0 8px;font-size:1.1em;color:#d4c8a8;">Song Already Generated</h3>
    <p style="margin:0 0 4px;font-size:0.95em;color:#c0b090;font-weight:600;">${item.title || 'Unknown'}</p>
    <p style="margin:0 0 20px;font-size:0.82em;color:#8a7e6b;">${item.channel || ''}</p>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button id="dup-cancel" style="padding:8px 18px;border-radius:6px;border:1px solid #4a3f35;background:transparent;color:#c0b090;cursor:pointer;font-size:0.9em;">Cancel</button>
      <button id="dup-view" style="padding:8px 18px;border-radius:6px;border:none;background:#6b8f5e;color:#fff;cursor:pointer;font-size:0.9em;">View Song</button>
      <button id="dup-regen" style="padding:8px 18px;border-radius:6px;border:none;background:#b08040;color:#fff;cursor:pointer;font-size:0.9em;">Regenerate</button>
    </div>
  `;

  overlay.appendChild(dialog);
  document.body.appendChild(overlay);

  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  document.getElementById('dup-cancel').addEventListener('click', () => overlay.remove());
  document.getElementById('dup-view').addEventListener('click', () => {
    overlay.remove();
    showPlayerForJob(item.id);
  });
  document.getElementById('dup-regen').addEventListener('click', () => {
    overlay.remove();
    submitJob(true);
  });
}

// ---- Processing State ----

function showProcessing() {
  showState('processing');
  // Set step names based on job mode
  const jobMode = currentJob.mode || 'karaoke';
  STEP_NAMES = jobMode === 'subtitled' ? STEP_NAMES_SUBTITLED : STEP_NAMES_KARAOKE;
  const titleEl = document.getElementById('processing-title');
  titleEl.textContent = currentJob.title || 'Processing...';
  renderSteps();
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(pollJob, 2000);
  pollJob();
}

function renderSteps() {
  const container = document.getElementById('steps-container');
  container.innerHTML = STEP_NAMES.map((name, i) => `
    <div class="step pending" id="step-${i}">
      <div class="step-icon">${i + 1}</div>
      <div class="step-body">
        <div class="step-title">${name}</div>
        <div class="step-bar"><div class="step-bar-fill" style="width:0%"></div></div>
        <div class="step-time"></div>
      </div>
    </div>
  `).join('');
}

async function pollJob() {
  try {
    const resp = await fetch('/api/jobs/current');
    const data = await resp.json();
    if (!data.job) return;
    currentJob = data.job;

    // Update title if it arrived
    const titleEl = document.getElementById('processing-title');
    if (currentJob.title && titleEl) titleEl.textContent = currentJob.title;

    if (currentJob.status === 'done') {
      clearInterval(pollInterval);
      pollInterval = null;
      updateProgress(); // final update to show all steps as done
      showInlinePlayer(currentJob.id);
      return;
    }
    if (currentJob.status === 'failed') {
      clearInterval(pollInterval);
      pollInterval = null;
      showError(currentJob.error || 'Unknown error');
      return;
    }

    updateProgress();
  } catch (e) {
    // Silently retry on next interval
  }
}

function updateProgress() {
  const job = currentJob;
  const now = Date.now();

  for (let i = 0; i < STEP_NAMES.length; i++) {
    const el = document.getElementById('step-' + i);
    const stepNum = i + 1;
    const barFill = el.querySelector('.step-bar-fill');
    const timeEl = el.querySelector('.step-time');

    el.className = 'step';
    if (stepNum < job.step || job.status === 'done') {
      el.classList.add('done');
      barFill.style.width = '100%';
      timeEl.textContent = 'Done';
    } else if (stepNum === job.step) {
      el.classList.add('active');
      const pct = Math.round((job.step_progress || 0) * 100);
      barFill.style.width = pct + '%';

      const stepStarted = new Date(job.step_started_at).getTime();
      const stepElapsed = (now - stepStarted) / 1000;
      const stepEst = job.step_estimates ? job.step_estimates[i] : null;

      let timeText = formatDuration(stepElapsed);
      if (stepEst && stepEst > 1) {
        timeText += ' / ~' + formatDuration(stepEst) + ' est.';
      }
      timeEl.textContent = timeText;
    } else {
      el.classList.add('pending');
      barFill.style.width = '0%';
      if (job.step_estimates && job.step_estimates[i] > 1) {
        timeEl.textContent = '~' + formatDuration(job.step_estimates[i]) + ' est.';
      } else {
        timeEl.textContent = '';
      }
    }
  }

  // Overall progress bar
  let overallPct = 0;
  let remainingEst = 0;
  const etaEl = document.getElementById('overall-eta');

  if (job.status === 'done') {
    overallPct = 100;
    etaEl.textContent = 'Complete';
  } else if (job.step_estimates && job.estimated_total > 0) {
    let completedTime = 0;
    for (let i = 0; i < job.step - 1; i++) {
      completedTime += job.step_estimates[i];
    }
    const currentStepEst = job.step_estimates[job.step - 1] || 0;
    completedTime += currentStepEst * (job.step_progress || 0);
    overallPct = Math.min((completedTime / job.estimated_total) * 100, 99);
    remainingEst = job.estimated_total - completedTime;
    if (remainingEst > 5) {
      etaEl.textContent = '~' + formatDuration(remainingEst) + ' remaining';
    } else {
      etaEl.textContent = 'Almost done...';
    }
  } else {
    overallPct = ((job.step - 1) / 5) * 100;
    etaEl.textContent = 'Estimating...';
  }

  document.getElementById('overall-fill').style.width = overallPct + '%';

  // Update output files panel
  renderOutputFiles(job);
}

const HIDDEN_FILES = new Set(['wav', 'ass']);

function renderOutputFiles(job) {
  const container = document.getElementById('output-files');
  if (!job.artifacts || Object.keys(job.artifacts).length === 0) {
    container.innerHTML = '<p class="output-placeholder">Files will appear here as each step completes.</p>';
    return;
  }

  const files = [];
  let hasLyrics = false;
  for (const [step, arts] of Object.entries(job.artifacts)) {
    for (const a of arts) {
      const ext = a.name.split('.').pop().toLowerCase();
      if (HIDDEN_FILES.has(ext)) continue;
      if (a.name === 'lyrics.json') { hasLyrics = true; continue; }
      files.push({ ...a, step: parseInt(step), ext });
    }
  }

  if (files.length === 0 && !hasLyrics) {
    container.innerHTML = '<p class="output-placeholder">Files will appear here as each step completes.</p>';
    return;
  }

  let html = files.map(f => `
    <a class="output-file" href="/api/jobs/${job.id}/artifact/${f.path}" title="Download ${f.name}">
      <div class="output-file-icon">${f.ext}</div>
      <span class="output-file-name">${f.name}</span>
      <span class="output-file-step">Step ${f.step}</span>
    </a>
  `).join('');

  if (hasLyrics) {
    html += `
      <a class="output-file" href="#" onclick="showLyricsPopup('${job.id}'); return false;" title="View lyrics">
        <div class="output-file-icon" style="background:#3a2e20; color:#e8d5a3;">Aa</div>
        <span class="output-file-name">Lyrics</span>
        <span class="output-file-step">Step 3</span>
      </a>
    `;
  }

  container.innerHTML = html;
}

async function showLyricsPopup(jobId) {
  const overlay = document.getElementById('lyrics-overlay');
  const body = document.getElementById('lyrics-popup-body');
  body.innerHTML = '<p style="color:#8a7e6b;">Loading...</p>';
  overlay.classList.remove('hidden');

  try {
    const resp = await fetch(`/api/jobs/${jobId}/lyrics`);
    const words = await resp.json();
    if (!words || words.length === 0) {
      body.innerHTML = '<p style="color:#8a7e6b;">No lyrics found.</p>';
      return;
    }
    // Group into lines of ~8 words
    const lines = [];
    for (let i = 0; i < words.length; i += 8) {
      lines.push(words.slice(i, i + 8).map(w => w.text).join(' '));
    }
    body.innerHTML = lines.map(l => `<p class="lyrics-popup-line">${escapeHtml(l)}</p>`).join('');
  } catch (e) {
    body.innerHTML = '<p style="color:#e07050;">Failed to load lyrics.</p>';
  }
}

function closeLyricsPopup() {
  document.getElementById('lyrics-overlay').classList.add('hidden');
}

// ---- YouTube Subtitled Player ----

let ytPlayer = null;
let subtitleCues = [];
let subtitlesVisible = true;
let subtitleAnimFrame = null;
const SUBTITLE_OFFSET = -0.5; // seconds — negative = delay subtitles to sync with video

function parseSRT(text) {
  const cues = [];
  const blocks = text.trim().split(/\n\n+/);
  for (const block of blocks) {
    const lines = block.split('\n');
    if (lines.length < 3) continue;
    const timeMatch = lines[1].match(/(\d{2}):(\d{2}):(\d{2}),(\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2}),(\d{3})/);
    if (!timeMatch) continue;
    const start = +timeMatch[1]*3600 + +timeMatch[2]*60 + +timeMatch[3] + +timeMatch[4]/1000;
    const end = +timeMatch[5]*3600 + +timeMatch[6]*60 + +timeMatch[7] + +timeMatch[8]/1000;
    const text = lines.slice(2).join('\n');
    cues.push({ start, end, text });
  }
  return cues;
}

function extractVideoId(url) {
  const m = url.match(/(?:v=|youtu\.be\/|\/embed\/|\/v\/|\/shorts\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

function destroyYtPlayer() {
  if (subtitleAnimFrame) {
    cancelAnimationFrame(subtitleAnimFrame);
    subtitleAnimFrame = null;
  }
  if (ytPlayer && ytPlayer.destroy) {
    try { ytPlayer.destroy(); } catch(e) {}
    ytPlayer = null;
  }
  subtitleCues = [];
}

let _subtitledJobId = null;

function renderSubtitledPlayer(jobId, youtubeUrl, languages) {
  destroyYtPlayer();
  _subtitledJobId = jobId;
  const videoId = extractVideoId(youtubeUrl);
  if (!videoId) return;

  // Normalize languages: support old single-language jobs
  if (!languages || languages.length === 0) languages = [];

  // Language selector options
  const langOptions = languages.map((code, i) =>
    `<option value="${code}" ${i === 0 ? 'selected' : ''}>${LANG_NAMES_ALL[code] || code}</option>`
  ).join('');

  const langSelector = languages.length > 1
    ? `<select id="subtitle-lang-select" onchange="switchSubtitleLang(this.value)" style="padding:3px 6px;border-radius:6px;border:1px solid rgba(74,63,47,0.6);background:rgba(26,22,18,0.85);color:#d4c8b0;font-size:0.8rem;font-family:inherit;cursor:pointer;">${langOptions}</select>`
    : (languages.length === 1 ? `<span class="toggle-label">${LANG_NAMES_ALL[languages[0]] || languages[0]}</span>` : '');

  // Download links
  const dlIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
  const downloadLinks = languages.map(code =>
    `<a class="btn-download-sm" href="/api/jobs/${jobId}/download/subtitles_${code}.srt">${dlIcon} ${LANG_NAMES_ALL[code] || code} SRT</a>`
  ).join(' ');

  const area = _playerAreaEl();
  area.innerHTML = `
    <div class="yt-player-container" id="yt-player-container">
      <div id="yt-player-target"></div>
      <div class="subtitle-overlay" id="subtitle-overlay"></div>
      <div class="subtitle-controls">
        ${langSelector}
        <label class="toggle-switch" title="Toggle subtitles">
          <input type="checkbox" id="subtitle-toggle-cb" checked onchange="subtitlesVisible=this.checked; if(!this.checked) document.getElementById('subtitle-overlay').textContent=''">
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">CC</span>
        <button class="yt-fullscreen-btn" onclick="toggleYtFullscreen()" title="Fullscreen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        </button>
      </div>
    </div>
    ${downloadLinks ? `<div class="tab-download">${downloadLinks}</div>` : ''}`;

  // Load first language SRT
  if (languages.length > 0) {
    switchSubtitleLang(languages[0], true);
  }

  // Create YouTube player — disable native fullscreen (fs:0) so we control it
  function createPlayer() {
    ytPlayer = new YT.Player('yt-player-target', {
      videoId: videoId,
      playerVars: { autoplay: 0, modestbranding: 1, rel: 0, fs: 0 },
      events: {
        onReady: () => { startSubtitleSync(); },
      },
    });
  }

  if (window.YT && window.YT.Player) {
    createPlayer();
  } else {
    window._pendingYtCreate = createPlayer;
  }
}

function switchSubtitleLang(langCode, skipSync) {
  if (!_subtitledJobId) return;
  fetch(`/api/jobs/${_subtitledJobId}/subtitles/${langCode}`)
    .then(r => r.text())
    .then(text => {
      subtitleCues = parseSRT(text);
      // Clear current display to force refresh
      const overlay = document.getElementById('subtitle-overlay');
      if (overlay) overlay.textContent = '';
    })
    .catch(() => { subtitleCues = []; });
}

function toggleYtFullscreen() {
  const container = document.getElementById('yt-player-container');
  if (!container) return;
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    container.requestFullscreen();
  }
}

// YouTube API callback
function onYouTubeIframeAPIReady() {
  if (window._pendingYtCreate) {
    window._pendingYtCreate();
    window._pendingYtCreate = null;
  }
}

function startSubtitleSync() {
  const overlay = document.getElementById('subtitle-overlay');
  if (!overlay) return;

  let lastText = '';
  function tick() {
    subtitleAnimFrame = requestAnimationFrame(tick);
    if (!ytPlayer || !ytPlayer.getCurrentTime) return;
    if (!subtitlesVisible) return;

    const t = ytPlayer.getCurrentTime() + SUBTITLE_OFFSET;
    let activeText = '';
    for (const cue of subtitleCues) {
      if (t >= cue.start && t <= cue.end) {
        activeText = cue.text;
        break;
      }
    }
    if (activeText !== lastText) {
      overlay.textContent = activeText;
      lastText = activeText;
    }
  }
  tick();
}

function formatDuration(secs) {
  secs = Math.round(secs);
  if (secs < 60) return secs + 's';
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  if (m < 60) return m + 'm ' + (s > 0 ? s + 's' : '');
  const h = Math.floor(m / 60);
  return h + 'h ' + (m % 60) + 'm';
}

  const btn = document.getElementById('btn-resume');

  btn.textContent = 'Resuming...';

  try {
    const resp = await fetch(`/api/jobs/${currentJob.id}/resume`, { method: 'POST' });

      return;
    }
    if (!resp.ok) {

      throw new Error(data.detail || 'Failed to resume');

    const data = await resp.json();

let vocalsAudioEl = null;
let vocalsOn = false;
let _currentVideoJobId = null;

function switchTab(tab, jobId) {

// --- Vocal toggle sync ---

function preloadVocalsAudio(jobId) {
  if (vocalsAudioEl && _currentVideoJobId === jobId) return;
  destroyVocalsSync();

  _currentVideoJobId = jobId;
  vocalsAudioEl = new Audio(`/api/jobs/${jobId}/vocals`);
  vocalsAudioEl.preload = 'auto';
  vocalsAudioEl.volume = 0;
  // Just preload — don't play until user interaction

  activeMediaEl.addEventListener('play', onMediaPlay);
  activeMediaEl.addEventListener('pause', onMediaPause);
  activeMediaEl.addEventListener('seeked', onMediaSeeked);
}

function toggleVocals(on) {
  vocalsOn = on;
  _syncedOnce = false;
  if (!vocalsAudioEl || !activeMediaEl) return;

  if (on) {
    vocalsAudioEl.volume = 1;
    vocalsAudioEl.currentTime = activeMediaEl.currentTime + VOCALS_OFFSET;
    if (!activeMediaEl.paused) {
      vocalsAudioEl.play().catch(() => {});
    }
  } else {
    vocalsAudioEl.volume = 0;
    vocalsAudioEl.pause();
  }
}

function destroyVocalsSync() {
  if (vocalsAudioEl) {
    vocalsAudioEl.pause();
    vocalsAudioEl.src = '';
    vocalsAudioEl = null;
  }
  vocalsOn = false;
  _currentVideoJobId = null;
  if (activeMediaEl) {
    activeMediaEl.removeEventListener('play', onMediaPlay);
    activeMediaEl.removeEventListener('pause', onMediaPause);
    activeMediaEl.removeEventListener('seeked', onMediaSeeked);
  }
}

function onMediaPlay() {
  if (vocalsAudioEl && vocalsOn) {
    vocalsAudioEl.currentTime = activeMediaEl.currentTime + VOCALS_OFFSET;
    vocalsAudioEl.play().catch(() => {});
  }
}

function onMediaPause() {
  if (vocalsAudioEl) {
    vocalsAudioEl.pause();
  }
}

function onMediaSeeked() {
  _syncedOnce = false;
  if (vocalsAudioEl && vocalsOn) {
    vocalsAudioEl.currentTime = activeMediaEl.currentTime + VOCALS_OFFSET;
    if (!activeMediaEl.paused) {
      vocalsAudioEl.play().catch(() => {});
    }
  }
}

// ---- Synced Lyrics ----

const WORDS_PER_LINE = 6;
let lyricsLines = [];
let currentLineIdx = -1;

function renderLyrics() {
  const panel = _lyricsPanelEl();
  panel.innerHTML = '';
  lyricsLines = [];
  currentLineIdx = -1;

  if (!lyricsData || lyricsData.length === 0) {
    panel.innerHTML = '<p style="color:#666">No lyrics available</p>';
    return;
  }

  for (let i = 0; i < lyricsData.length; i += WORDS_PER_LINE) {
    const chunk = lyricsData.slice(i, i + WORDS_PER_LINE);
    const lineEl = document.createElement('div');
    lineEl.className = 'lyrics-line';

    const lineData = { words: [], el: lineEl };

    chunk.forEach(w => {
      const span = document.createElement('span');
      span.className = 'lyrics-word';
      span.textContent = w.text + ' ';
      lineEl.appendChild(span);
      lineData.words.push({ ...w, el: span });
    });

    panel.appendChild(lineEl);
    lyricsLines.push(lineData);
  }
}

let _syncedOnce = false;
const VOCALS_OFFSET = 0.15; // seconds — compensate for MP3 encoder padding

function onTimeUpdate() {
  // One-time sync correction after playback starts
  if (vocalsAudioEl && vocalsOn && !activeMediaEl.paused && !_syncedOnce) {
    const expected = activeMediaEl.currentTime + VOCALS_OFFSET;
    const drift = expected - vocalsAudioEl.currentTime;
    if (Math.abs(drift) > 0.1) {
      vocalsAudioEl.currentTime = expected;
    }
    _syncedOnce = true;
  }

  if (!activeMediaEl || !lyricsLines.length) return;
  const t = activeMediaEl.currentTime;

  let activeLine = -1;

  for (let li = 0; li < lyricsLines.length; li++) {
    const line = lyricsLines[li];
    const lineStart = line.words[0].start;
    const lineEnd = line.words[line.words.length - 1].end;
    const isCurrentLine = t >= lineStart - 0.3 && t <= lineEnd + 0.5;

    if (isCurrentLine) activeLine = li;

    if (t > lineEnd + 0.5) {
      line.el.className = 'lyrics-line past';
    } else {
      line.el.className = 'lyrics-line';
    }

    for (const w of line.words) {
      if (t >= w.start && t < w.end) {
        w.el.className = 'lyrics-word active';
      } else if (t >= w.end) {
        w.el.className = 'lyrics-word sung';
      } else {
        w.el.className = 'lyrics-word';
      }
    }
  }

  if (activeLine >= 0 && activeLine !== currentLineIdx) {
    currentLineIdx = activeLine;
    const panel = _lyricsPanelEl();
    const lineEl = lyricsLines[activeLine].el;
    const panelRect = panel.getBoundingClientRect();
    const lineRect = lineEl.getBoundingClientRect();
    const offset = lineRect.top - panelRect.top - panelRect.height / 3;
    panel.scrollTop += offset;
  }
}

// ---- Library ----

let libraryItems = [];
let libraryFilters = { search: '', channels: new Set(), categories: new Set() };

async function loadLibrary() {
  const sidebar = document.getElementById('library-sidebar');
  const main = document.getElementById('library-main');
  main.innerHTML = '<p style="text-align:center; color:#8a7e6b;">Loading...</p>';
  sidebar.innerHTML = '';

  try {
    const resp = await fetch('/api/library');
    const data = await resp.json();
    libraryItems = data.items || [];

    if (libraryItems.length === 0) {
      sidebar.innerHTML = '';
      main.innerHTML = `
        <div class="library-empty">
          <p>No songs yet.</p>
          <p style="margin-top:8px;">Generate your first karaoke video to see it here.</p>
        </div>
      `;
      return;
    }

    libraryFilters = { search: '', channels: new Set(), categories: new Set() };
    renderLibrarySidebar();
    renderLibraryGrid();
  } catch (e) {
    main.innerHTML = '<p style="text-align:center; color:#e07050;">Failed to load library</p>';
  }
}

function renderLibrarySidebar() {
  const sidebar = document.getElementById('library-sidebar');

  // Collect facets
  const channelCounts = {};
  const categoryCounts = {};
  for (const item of libraryItems) {
    if (item.channel) channelCounts[item.channel] = (channelCounts[item.channel] || 0) + 1;
    for (const cat of (item.categories || [])) {
      categoryCounts[cat] = (categoryCounts[cat] || 0) + 1;
    }
  }

  let html = `
    <div class="filter-section">
      <div class="filter-heading">Search</div>
      <input class="filter-search" type="text" placeholder="Search songs..."
             value="${escapeHtml(libraryFilters.search)}"
             oninput="libraryFilters.search=this.value; renderLibraryGrid()" />
    </div>
  `;

  // Channel facet
  const channels = Object.entries(channelCounts).sort((a, b) => b[1] - a[1]);
  if (channels.length > 0) {
    html += `<div class="filter-section">
      <div class="filter-heading">Channel</div>
      <div class="filter-options">`;
    for (const [ch, count] of channels) {
      const active = libraryFilters.channels.has(ch);
      html += `
        <div class="filter-option ${active ? 'active' : ''}" onclick="toggleFilter('channels','${escapeHtml(ch)}')">
          <div class="filter-check"></div>
          <span class="filter-name" title="${escapeHtml(ch)}">${escapeHtml(ch)}</span>
          <span class="filter-count">${count}</span>
        </div>`;
    }
    html += `</div></div>`;
  }

  // Category facet
  const categories = Object.entries(categoryCounts).sort((a, b) => b[1] - a[1]);
  if (categories.length > 0) {
    html += `<div class="filter-section">
      <div class="filter-heading">Category</div>
      <div class="filter-options">`;
    for (const [cat, count] of categories) {
      const active = libraryFilters.categories.has(cat);
      html += `
        <div class="filter-option ${active ? 'active' : ''}" onclick="toggleFilter('categories','${escapeHtml(cat)}')">
          <div class="filter-check"></div>
          <span class="filter-name">${escapeHtml(cat)}</span>
          <span class="filter-count">${count}</span>
        </div>`;
    }
    html += `</div></div>`;
  }

  // Clear filters
  const hasFilters = libraryFilters.search || libraryFilters.channels.size || libraryFilters.categories.size;
  if (hasFilters) {
    html += `<a class="filter-clear" href="#" onclick="clearFilters(); return false;">Clear all filters</a>`;
  }

  sidebar.innerHTML = html;
}

function toggleFilter(facet, value) {
  const set = libraryFilters[facet];
  if (set.has(value)) set.delete(value);
  else set.add(value);
  renderLibrarySidebar();
  renderLibraryGrid();
}

function clearFilters() {
  libraryFilters = { search: '', channels: new Set(), categories: new Set() };
  renderLibrarySidebar();
  renderLibraryGrid();
}

async function deleteJob(jobId) {
  if (!confirm('Delete this song and all its files? This cannot be undone.')) return;
  try {
    const resp = await fetch(`/api/jobs/${jobId}`, { method: 'DELETE' });
    if (!resp.ok) {
      const data = await resp.json().catch(() => ({}));
      alert(data.detail || 'Failed to delete');
      return;
    }
    loadLibrary();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

function renderLibraryGrid() {
  const main = document.getElementById('library-main');
  const query = libraryFilters.search.toLowerCase();

  const filtered = libraryItems.filter(item => {
    // Text search
    if (query) {
      const haystack = [item.title, item.channel, ...(item.tags || [])].filter(Boolean).join(' ').toLowerCase();
      if (!haystack.includes(query)) return false;
    }
    // Channel filter
    if (libraryFilters.channels.size > 0 && !libraryFilters.channels.has(item.channel)) return false;
    // Category filter
    if (libraryFilters.categories.size > 0) {
      const cats = item.categories || [];
      if (!cats.some(c => libraryFilters.categories.has(c))) return false;
    }
    return true;
  });

  if (filtered.length === 0) {
    main.innerHTML = `
      <div class="library-results-count">${libraryItems.length} songs, 0 matching</div>
      <div class="library-empty"><p>No songs match your filters.</p></div>
    `;
    return;
  }

  const count = `<div class="library-results-count">${filtered.length} of ${libraryItems.length} songs</div>`;
  const grid = filtered.map(item => {
    const duration = item.audio_duration ? formatDuration(item.audio_duration) : '';
    const channel = item.channel ? escapeHtml(item.channel) : '';
    const date = item.upload_date
      ? item.upload_date.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3')
      : '';
    const thumb = item.thumbnail
      ? `<img class="library-thumb" src="${item.thumbnail}" alt="" loading="lazy" />`
      : `<div class="library-thumb" style="display:flex;align-items:center;justify-content:center;color:#4a3f2f;font-size:2rem;">&#9835;</div>`;
    const mode = item.mode || 'karaoke';
    const badgeClass = mode === 'subtitled' ? 'subtitled' : 'karaoke';
    let badgeText = mode === 'subtitled' ? 'Subtitled' : 'Karaoke';
    const langs = item.languages || (item.language ? [item.language] : []);
    if (mode === 'subtitled' && langs.length > 0) {
      badgeText += ' \u00b7 ' + langs.map(c => (LANG_NAMES_ALL[c] || c)).join(', ');
    }
    return `
      <div class="library-item" onclick="showPlayerForJob('${item.id}')">
        <div class="library-item-header">
          ${thumb}
          <span class="library-mode-badge ${badgeClass}">${badgeText}</span>
          <button class="library-delete-btn" onclick="event.stopPropagation(); deleteJob('${item.id}')" title="Delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
        <div class="library-info">
          <h3>${escapeHtml(item.title || 'Unknown')}</h3>
          ${channel ? `<div class="channel">${channel}</div>` : ''}
          <span class="meta">${[duration, date].filter(Boolean).join(' &middot; ')}</span>
        </div>
      </div>
    `;
  }).join('');

  main.innerHTML = count + '<div class="library-grid">' + grid + '</div>';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ---- Init ----

async function init() {
  try {
    const resp = await fetch('/api/jobs/current');
    const data = await resp.json();
    if (!data.job) return;
    currentJob = data.job;

    if (currentJob.status === 'running') {
      showProcessing();
    } else if (currentJob.status === 'done') {
      // Just stay on idle — user can go to library or click generate
    } else if (currentJob.status === 'failed') {
      // Only show error for very recent failures (within last 60 seconds)
      const failedAt = currentJob.finished_at ? new Date(currentJob.finished_at) : null;
      const fiveMinAgo = new Date(Date.now() - 60 * 1000);
      if (failedAt && failedAt > fiveMinAgo) {
        showError(currentJob.error || 'Previous job failed. You can resume it.');
      }
    }
  } catch (e) {
    // Server not reachable — stay on idle
  }
}

init();
</script>
