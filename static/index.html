function toggleAdminPerms(userId) {
  const el = document.getElementById(`admin-perms-${userId}`);
  if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
}

async function saveAdminPerms(userId) {
  const body = {
    max_karaoke_per_day: parseInt(document.getElementById(`perm-karaoke-${userId}`).value) || 0,
    max_subtitled_per_day: parseInt(document.getElementById(`perm-subtitled-${userId}`).value) || 0,
    max_queue_length: parseInt(document.getElementById(`perm-queue-${userId}`).value) || 0,
    can_download_karaoke: document.getElementById(`perm-dl-karaoke-${userId}`).checked,
    can_download_instrumental: document.getElementById(`perm-dl-instr-${userId}`).checked,
    can_download_vocals: document.getElementById(`perm-dl-vocals-${userId}`).checked,
    can_delete_library: document.getElementById(`perm-delete-${userId}`).checked,
    can_share_library: document.getElementById(`perm-share-${userId}`).checked,
    can_request_songs: document.getElementById(`perm-request-songs-${userId}`).checked,
    max_invitations: parseInt(document.getElementById(`perm-invitations-${userId}`).value),
  };
  const resp = await fetch(`/api/admin/users/${userId}/permissions`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (resp.ok) {
    loadAdminUsers();
  } else {
    showAlert('Failed to save permissions');
  }
}

async function adminChangeRole(userId, newRole) {
  await fetch(`/api/admin/users/${userId}/role?role=${newRole}`, { method: 'PUT' });
  loadAdminUsers();
  if(document.getElementById('admin-tab-overview').style.display !== 'none') loadAdminOverview();
}

async function adminDeleteUser(userId, name) {
  if (!await showConfirm(`Delete user "${name}" and all their data?`)) return;
  const resp = await fetch(`/api/admin/users/${userId}`, { method: 'DELETE' });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    showAlert(err.detail || 'Failed to delete user');
    return;
  }
  loadAdminUsers();
  if(document.getElementById('admin-tab-overview').style.display !== 'none') loadAdminOverview();
}

function toggleCreateUserForm() {
  const form = document.getElementById('admin-create-user-form');
  if (form) form.style.display = form.style.display === 'none' ? '' : 'none';
}

async function adminCreateUser() {
  const name = document.getElementById('admin-new-user-name').value.trim();
  const email = document.getElementById('admin-new-user-email').value.trim();
  const password = document.getElementById('admin-new-user-password').value;
  const role = document.getElementById('admin-new-user-role').value;
  if (!name || !email || !password) {
    showAlert('Please fill in all fields');
    return;
  }
  const resp = await fetch('/api/admin/users', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, email, password, role }),
  });
  if (resp.ok) {
    toggleCreateUserForm();
    loadAdminUsers();
    if(document.getElementById('admin-tab-overview').style.display !== 'none') loadAdminOverview();
  } else {
    const err = await resp.json().catch(() => ({}));
    showAlert(err.detail || 'Failed to create user');
  }
}

let _activityFilter = '';
let _activityOffset = 0;
let _activityTimePreset = 8; // hours, 0 = show all
const _ACTIVITY_LIMIT = 50;
const _EVENT_COLORS = {
  login: '#6b8', queue: 'var(--accent)', view: '#7eb8da',
  invite: '#c89dda', comment: '#d4a84b', vote: '#e07050',
};
const _TIME_PRESETS = [
  { label: 'Last 1 hour', hours: 1 },
  { label: 'Last 8 hours', hours: 8 },
  { label: 'Last 24 hours', hours: 24 },
  { label: 'Last 3 days', hours: 72 },
  { label: 'Show All', hours: 0 },
];

async function loadAdminActivity(append) {
  const container = document.getElementById('admin-activity-container');
  if (!container) return;
  if (!append) {
    _activityOffset = 0;
    const list = container.querySelector('.activity-list');
    if (list) list.innerHTML = '<p style="color:var(--text-dim);padding:16px 12px;">Loading...</p>';
    else container.innerHTML = '<p style="color:var(--text-dim);padding:12px;">Loading...</p>';
  }
  try {
    const params = new URLSearchParams({ limit: _ACTIVITY_LIMIT, offset: _activityOffset });
    if (_activityFilter) params.set('event_type', _activityFilter);
    if (_activityTimePreset > 0) params.set('since_hours', _activityTimePreset);
    const resp = await fetch('/api/admin/activity?' + params);
    if (!resp.ok) throw new Error();
    const data = await resp.json();
    const entries = data.entries || [];
    const total = data.total || 0;

    const rows = entries.map(e => {
      const d = e.detail || {};
      const color = _EVENT_COLORS[e.event_type] || 'var(--text-dim)';
      const ts = e.created_at ? new Date(e.created_at).toLocaleString() : '';
      let summary = '';
      if (e.event_type === 'login') summary = d.method || '';
      else if (e.event_type === 'queue') summary = d.title ? `${d.title}` : d.url || '';
      else if (e.event_type === 'view') summary = d.job_id || '';
      else if (e.event_type === 'invite') summary = d.email || '';
      else if (e.event_type === 'comment') summary = d.text || '';
      else if (e.event_type === 'vote') summary = d.title || d.job_id || d.wishlist_item_id || '';
      if (summary.length > 80) summary = summary.substring(0, 80) + '...';
      return `
        <div style="display:flex;align-items:center;gap:12px;padding:8px 16px;border-bottom:1px solid var(--border-light);font-size:0.85rem;">
          <span style="width:145px;flex-shrink:0;color:var(--text-muted);font-size:0.78rem;">${ts}</span>
          <span style="width:100px;flex-shrink:0;font-weight:600;color:var(--text-bright);">${escapeHtml(e.user_name)}</span>
          <span style="width:68px;flex-shrink:0;padding:2px 8px;border-radius:4px;text-align:center;font-size:0.72rem;font-weight:600;text-transform:uppercase;color:#fff;background:${color};">${e.event_type}</span>
          <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-dim);">${escapeHtml(summary)}</span>
        </div>`;
    }).join('');

    const hasMore = (_activityOffset + entries.length) < total;
    const loadMoreBtn = hasMore ? `<div style="text-align:center;padding:12px;"><button class="admin-btn" onclick="_activityOffset+=${_ACTIVITY_LIMIT}; loadAdminActivity(true)">Load More</button></div>` : '';

    if (append) {
      const list = container.querySelector('.activity-list');
      if (list) {
        list.insertAdjacentHTML('beforeend', rows);
        const oldBtn = container.querySelector('.activity-load-more');
        if (oldBtn) oldBtn.outerHTML = loadMoreBtn ? `<div class="activity-load-more">${loadMoreBtn}</div>` : '';
      }
    } else {
      // Update just the table body, not the toolbar
      const tableArea = container.querySelector('.activity-table-area');
      if (tableArea) {
        tableArea.innerHTML = `
          <div class="admin-section">
            <div class="activity-list">${rows || '<p style="color:var(--text-dim);padding:16px 12px;">No activity in this time range.</p>'}</div>
            ${hasMore ? `<div class="activity-load-more">${loadMoreBtn}</div>` : ''}
          </div>
          <div style="text-align:right;padding:4px 0;font-size:0.78rem;color:var(--text-muted);">${total} event${total !== 1 ? 's' : ''}</div>`;
      } else {
        container.innerHTML = `
          <div class="admin-section">
            <div class="activity-list">${rows || '<p style="color:var(--text-dim);padding:16px 12px;">No activity in this time range.</p>'}</div>
            ${hasMore ? `<div class="activity-load-more">${loadMoreBtn}</div>` : ''}
          </div>`;
      }
    }
  } catch (e) {
    if (!append) {
      const tableArea = container.querySelector('.activity-table-area');
      if (tableArea) tableArea.innerHTML = '<p style="color:var(--error);padding:12px;">Failed to load activity.</p>';
      else container.innerHTML = '<p style="color:var(--error);padding:12px;">Failed to load activity.</p>';
    }
  }
}

function setActivityTimePreset(hours) {
  _activityTimePreset = hours;
  _activityOffset = 0;
  document.querySelectorAll('.activity-time-btn').forEach(b => b.classList.toggle('active', parseFloat(b.dataset.hours) === hours));
  loadAdminActivity();
}

function setActivityTypeFilter(val) {
  _activityFilter = val;
  _activityOffset = 0;
  loadAdminActivity();
}

async function loadAdminFeedback() {
  const container = document.getElementById('admin-tab-feedback');

    const resp = await fetch('/api/admin/feedback');
    const data = await resp.json();
    let items = data.feedback || [];
    if (_adminFeedbackFilter !== 'all') {
      items = items.filter(fb => fb.status === _adminFeedbackFilter);
    }

    const filterBtns = ['all','new','reviewed','resolved'].map(f =>
      `<button class="admin-filter-btn${_adminFeedbackFilter === f ? ' active' : ''}" onclick="_adminFeedbackFilter='${f}'; loadAdminFeedback()">${f === 'all' ? 'All' : f.charAt(0).toUpperCase() + f.slice(1)}</button>`
    ).join('');

    container.innerHTML = `<div class="admin-filter-row">${filterBtns}</div>
      <div class="admin-section">${items.map(fb => {
        const statusColors = { new: 'var(--accent)', reviewed: 'var(--info)', resolved: 'var(--success)' };
        const statusOpts = ['new','reviewed','resolved'].filter(s => s !== fb.status).map(s =>
          `<button class="admin-btn" onclick="adminSetFeedbackStatus('${fb.id}','${s}')">${s}</button>`
        ).join('');
        const screenshotBtn = fb.screenshot_path
          ? `<button class="admin-btn" onclick="window.open('/api/admin/feedback/${fb.id}/screenshot','_blank')">Screenshot</button>`
          : '';
        return `<div class="admin-row" style="flex-direction:column;align-items:stretch;gap:6px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="name" style="flex:1;">${escapeHtml(fb.subject)}</span>
            <span class="role-badge" style="color:${statusColors[fb.status] || 'var(--text-dim)'};background:rgba(255,255,255,0.05);">${fb.status}</span>
          </div>
          <p style="color:var(--text);font-size:0.8rem;margin:0;line-height:1.4;">${escapeHtml(fb.description).substring(0, 300)}</p>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span class="meta">${fb.user_name || fb.user_email || ''} &mdash; ${fb.created_at ? new Date(fb.created_at).toLocaleDateString() : ''}</span>
            <div class="admin-row-actions">${screenshotBtn}${statusOpts}<button class="admin-btn danger" onclick="adminDeleteFeedback('${fb.id}')">&times;</button></div>
          </div>
        </div>`;
      }).join('') || '<p style="color:var(--text-dim);padding:16px;">No feedback.</p>'}</div>`;
  } catch (e) { container.innerHTML = '<p style="color:var(--error);padding:12px;">Failed to load feedback.</p>'; }

async function adminDeleteInvitation(invId) {
  if (!await showConfirm('Delete this invitation? The invitation credit will be returned to the user.')) return;
  try {
    const resp = await fetch(`/api/admin/invitations/${invId}`, { method: 'DELETE' });

    loadAdminInvitations();
  } catch (e) { showAlert('Error: ' + e.message); }

function copyInviteLink(btn, link) {
  navigator.clipboard.writeText(link).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.style.color = 'var(--success)';
    setTimeout(() => { btn.textContent = orig; btn.style.color = 'var(--text)'; }, 1500);
  });
}

async function saveAdminPrompt() {
  const text = document.getElementById('admin-analysis-prompt').value.trim();
  const status = document.getElementById('admin-prompt-status');
  try {
    const resp = await fetch('/api/admin/prompts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ analysis_prompt: text }),
    });
    if (!resp.ok) throw new Error();
    status.textContent = 'Saved';
    status.style.color = 'var(--success, #6b8)';
    // Clear cached analyses so new prompt takes effect
    _analysisCache = {};
    setTimeout(() => { status.textContent = ''; }, 3000);
  } catch (e) {
    status.textContent = 'Failed to save';
    status.style.color = 'var(--error)';
  }
}

function resetAdminPrompt() {
  const textarea = document.getElementById('admin-analysis-prompt');
  textarea.value = '';
  saveAdminPrompt();
}

      <div style="display:flex;gap:6px;padding:8px 12px;">
        ${filters.map(f => `<button class="admin-filter-btn${_adminWishlistFilter === f ? ' active' : ''}" onclick="_adminWishlistFilter='${f}'; loadAdminWishlist()">${f.charAt(0).toUpperCase() + f.slice(1)}</button>`).join('')}

                </label>
                <label style="display:flex;flex-direction:column;gap:2px;color:var(--text-dim);">Artist
                  <input type="text" id="admin-wish-artist-${item.id}" value="${escapeHtml(item.artist || '')}" style="width:100%;padding:5px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.8rem;font-family:inherit;" />

function toggleAdminWishlistDetail(itemId) {
  const el = document.getElementById(`admin-wish-detail-${itemId}`);
  if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
}

async function adminQueueWishlistWithUrl(itemId) {
  const url = document.getElementById(`admin-wish-url-${itemId}`).value.trim();
  if (!url) { showAlert('Please enter a YouTube URL before queueing'); return; }
  try {
    const resp = await fetch(`/api/admin/wishlist/${itemId}/queue`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, mode: 'karaoke', languages: [] }),
    });
    if (!resp.ok) { const d = await resp.json().catch(() => ({})); showAlert(d.detail || 'Failed to queue'); return; }
    loadAdminWishlist();
  } catch (e) { showAlert('Error: ' + e.message); }
}

async function adminDeleteWishlist(itemId) {
  if (!await showConfirm('Delete this song request?')) return;
  try {
    await fetch(`/api/admin/wishlist/${itemId}`, { method: 'DELETE' });
    loadAdminWishlist();
  } catch (e) { showAlert('Error: ' + e.message); }
}

async function loadAdminWorkers() {
  const container = document.getElementById('admin-system-sub-content') || document.getElementById('admin-tab-system');
  container.innerHTML = '<p style="color:var(--text-dim);padding:12px;">Loading...</p>';
  try {
    const resp = await fetch('/api/admin/workers');
    const data = await resp.json();
    const workers = data.workers || [];

    container.innerHTML = `<div class="admin-section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <label style="color:var(--text-bright);font-size:0.85rem;font-weight:600;">Production Workers</label>
        <button class="admin-btn" onclick="showAddWorkerForm()">+ Add Worker</button>
      </div>
      <div id="add-worker-form" style="display:none;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
          <div><label style="font-size:0.7rem;color:var(--text-dim);">Name</label>
            <input type="text" id="new-worker-name" placeholder="Mac Mini" style="width:100%;padding:4px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.8rem;box-sizing:border-box;" /></div>
          <div><label style="font-size:0.7rem;color:var(--text-dim);">URL</label>
            <input type="text" id="new-worker-url" placeholder="http://localhost:8001" style="width:100%;padding:4px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.8rem;box-sizing:border-box;" /></div>
        </div>
        <div style="margin-bottom:8px;"><label style="font-size:0.7rem;color:var(--text-dim);">API Key</label>
          <input type="text" id="new-worker-key" placeholder="optional shared secret" style="width:100%;padding:4px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.8rem;box-sizing:border-box;" /></div>
        <div style="display:flex;gap:6px;">
          <button class="admin-btn" onclick="addWorker()">Add</button>
          <button class="admin-btn" onclick="document.getElementById('add-worker-form').style.display='none'">Cancel</button>
        </div>
      </div>
      ${workers.length === 0 ? '<p style="color:var(--text-dim);font-size:0.8rem;padding:8px 0;">No workers configured. Add a worker to start processing queue items.</p>' : ''}
      ${workers.map(w => {
        const isOnline = w.online;
        const isBusy = isOnline && w.status === 'busy';
        const statusClass = isOnline ? (isBusy ? 'busy' : 'online') : 'offline';
        const statusText = isOnline ? w.status : 'offline';
        const jobInfo = w.current_job ? w.current_job.step_name || 'processing' : '';
        return `<div class="admin-worker-card">
          <div class="admin-worker-header">
            <div class="admin-worker-status ${statusClass}"></div>
            <span class="name" style="font-size:0.92rem;">${escapeHtml(w.name)}</span>
            <span style="font-size:0.78rem;color:var(--text-muted);text-transform:uppercase;font-weight:500;">${statusText}</span>
            ${jobInfo ? `<span style="font-size:0.78rem;color:var(--accent);font-style:italic;">${escapeHtml(jobInfo)}</span>` : ''}
            <div class="admin-worker-actions">
              <button class="admin-btn" onclick="testWorker('${w.id}')">Test</button>
              <button class="admin-btn" onclick="toggleWorker('${w.id}')" style="color:${w.enabled !== false ? 'var(--success)' : 'var(--error)'};">${w.enabled !== false ? 'Enabled' : 'Disabled'}</button>
              <button class="admin-btn danger" onclick="deleteWorker('${w.id}')">Remove</button>
            </div>
          </div>
          <div class="admin-worker-meta">
            <span>${escapeHtml(w.url)}</span>
            ${w.device ? `<span>${w.device}</span>` : ''}
            ${w.last_seen ? `<span>Last seen ${new Date(w.last_seen).toLocaleTimeString()}</span>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  } catch (e) {
    container.innerHTML = '<p style="color:var(--error);padding:12px;">Failed to load workers.</p>';
  }
}

function showAddWorkerForm() {
  document.getElementById('add-worker-form').style.display = '';
  document.getElementById('new-worker-name').focus();
}

async function addWorker() {
  const name = document.getElementById('new-worker-name').value.trim();
  const url = document.getElementById('new-worker-url').value.trim();
  const api_key = document.getElementById('new-worker-key').value.trim();
  if (!name || !url) return showAlert('Name and URL are required');
  const resp = await fetch('/api/admin/workers', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, url, api_key }),
  });
  if (resp.ok) {
    const data = await resp.json();
    // Auto-test to populate status
    if (data.worker && data.worker.id) {
      await fetch(`/api/admin/workers/${data.worker.id}/test`, { method: 'POST' });
    }
    loadAdminWorkers();
  } else {
    showAlert('Failed to add worker');
  }
}

async function testWorker(workerId) {
  const resp = await fetch(`/api/admin/workers/${workerId}/test`, { method: 'POST' });
  const data = await resp.json();
  if (data.success) {
    showAlert(`Connected: ${data.status.name} (${data.status.device}, ${data.status.status})`);
    loadAdminWorkers();  // refresh to show updated status
  } else {
    showAlert(`Failed: ${data.error}`);
  }
}

async function toggleWorker(workerId) {
  await fetch(`/api/admin/workers/${workerId}/toggle`, { method: 'POST' });
  loadAdminWorkers();
}

async function deleteWorker(workerId) {
  if (!await showConfirm('Remove this worker?')) return;
  await fetch(`/api/admin/workers/${workerId}`, { method: 'DELETE' });
  loadAdminWorkers();
}

async function saveAdminSettings() {
  const status = document.getElementById('admin-settings-status');
  const modes = [];
  if (document.getElementById('set-mode-karaoke').checked) modes.push('karaoke');
  if (document.getElementById('set-mode-subtitled').checked) modes.push('subtitled');
  if (document.getElementById('set-mode-both').checked) modes.push('both');

  const body = {
    default_max_karaoke_per_day: parseInt(document.getElementById('set-max-karaoke').value) || 5,
    default_max_subtitled_per_day: parseInt(document.getElementById('set-max-subtitled').value) || 15,
    default_max_queue_length: parseInt(document.getElementById('set-max-queue').value) || 10,
    default_max_invitations: parseInt(document.getElementById('set-max-invitations').value),
    default_can_download_karaoke: document.getElementById('set-def-dl-karaoke').checked,
    default_can_download_instrumental: document.getElementById('set-def-dl-instrumental').checked,
    default_can_download_vocals: document.getElementById('set-def-dl-vocals').checked,
    default_can_delete_library: document.getElementById('set-def-delete').checked,
    default_can_share_library: document.getElementById('set-def-share').checked,
    default_can_request_songs: document.getElementById('set-def-request-songs').checked,
    feature_lyrics_correction: document.getElementById('set-feat-lyrics-correction').checked,
    feature_analysis: document.getElementById('set-feat-analysis').checked,
    feature_translation: document.getElementById('set-feat-translation').checked,
    feature_wishlist: document.getElementById('set-feat-wishlist').checked,
    allowed_modes: modes,
    max_disk_space_mb: parseInt(document.getElementById('set-max-disk').value) || 0,
    demucs_model: document.getElementById('set-demucs-model').value,
    max_subtitle_languages: parseInt(document.getElementById('set-max-sub-langs').value) || 3,
  };

  try {
    const resp = await fetch('/api/admin/settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!resp.ok) throw new Error();
    status.textContent = 'Saved';
    status.style.color = 'var(--success, #6b8)';
    setTimeout(() => { status.textContent = ''; }, 3000);
  } catch (e) {

  }
}

// ---- Playlists ----

let userPlaylists = [];
let activePlaylistFilter = null;
let _viewingPlaylistId = null; // which playlist is open in detail view
let _playlistQueue = [];       // ordered job IDs for playback
let _playlistQueueIdx = -1;    // current index in queue
let _playlistQueuePlId = null; // playlist ID of current queue

async function loadPlaylists() {
  if (!currentUser) return;
  try {
    const resp = await fetch('/api/playlists');
    const data = await resp.json();

  } catch (e) { userPlaylists = []; }
}

function getPlaylistJobIds() {
  if (activePlaylistFilter === null) return null;
  const pl = userPlaylists.find(p => String(p.id) === String(activePlaylistFilter));

}

// --- Playlists Overlay ---

function openPlaylistsOverlay() {

  document.getElementById('user-dropdown').classList.remove('open');

}

function closePlaylists() {

}

function showPlaylistListView() {

function renderPlaylistsOverlayList() {

async function createPlaylistFromOverlay() {

async function deletePlaylistFromOverlay(id) {

// --- Playlist Detail View ---

function _getLibItem(jobId) {
  return (typeof libraryItems !== 'undefined' ? libraryItems : []).find(i => i.id === jobId);
}

function openPlaylistDetail(plId) {
  _viewingPlaylistId = plId;
  document.getElementById('playlists-list-view').style.display = 'none';
  document.getElementById('playlists-detail-view').style.display = '';
  renderPlaylistDetail();
}

function renderPlaylistDetail() {
  const pl = userPlaylists.find(p => String(p.id) === String(_viewingPlaylistId));
  if (!pl) { showPlaylistListView(); return; }

  document.getElementById('pl-detail-title').textContent = pl.name;

  const list = document.getElementById('pl-songs-list');
  const items = pl.items || [];
  if (items.length === 0) {
    list.innerHTML = '<div class="pl-empty">No songs in this playlist yet.<br>Use the + button on jukebox cards to add songs.</div>';
    return;
  }

  list.innerHTML = items.map((item, idx) => {
    const lib = _getLibItem(item.job_id);
    const title = lib ? escapeHtml(lib.title) : item.job_id;
    const channel = lib?.channel ? escapeHtml(lib.channel) : '';
    const thumb = lib?.thumbnail ? `<img class="pl-song-thumb" src="${lib.thumbnail}" alt="" />` : '<div class="pl-song-thumb"></div>';
    const isPlaying = _playlistQueuePlId === String(pl.id) && _playlistQueue[_playlistQueueIdx] === item.job_id;
    return `<div class="pl-song-item${isPlaying ? ' now-playing' : ''}" draggable="true"
                 data-idx="${idx}" data-job-id="${item.job_id}"
                 ondragstart="plDragStart(event)" ondragover="plDragOver(event)"
                 ondrop="plDrop(event)" ondragend="plDragEnd(event)"
                 ondragenter="plDragEnter(event)" ondragleave="plDragLeave(event)">
      <span class="pl-song-drag">&#9776;</span>
      ${thumb}
      <div class="pl-song-info">
        <div class="title">${title}</div>
        ${channel ? `<div class="channel">${channel}</div>` : ''}
      </div>
      <button class="pl-song-play" onclick="playFromPlaylist('${pl.id}', ${idx})" title="Play">&#9654;</button>
      <button class="pl-song-remove" onclick="removeSongFromPlaylist('${pl.id}', '${item.job_id}')" title="Remove">&times;</button>
    </div>`;
  }).join('');
}

// --- Drag-to-reorder ---

let _plDragIdx = null;

function plDragStart(e) {
  _plDragIdx = parseInt(e.currentTarget.dataset.idx);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', String(_plDragIdx));
}

function plDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  // Highlight the closest song item
  const item = e.target.closest('.pl-song-item');
  if (item) {
    document.querySelectorAll('.pl-song-item.drag-over').forEach(el => { if (el !== item) el.classList.remove('drag-over'); });
    item.classList.add('drag-over');
  }
}

function plDragEnter(e) {
  e.preventDefault();
}

function plDragLeave(e) {
  // Only remove if leaving the song item entirely (not entering a child)
  const item = e.currentTarget;
  const related = e.relatedTarget;
  if (related && item.contains(related)) return;
  item.classList.remove('drag-over');
}

function plDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.pl-song-item.drag-over').forEach(el => el.classList.remove('drag-over'));
}

async function plDrop(e) {
  e.preventDefault();
  document.querySelectorAll('.pl-song-item.drag-over').forEach(el => el.classList.remove('drag-over'));
  const dropTarget = e.target.closest('.pl-song-item');
  if (!dropTarget) return;
  const dropIdx = parseInt(dropTarget.dataset.idx);
  if (_plDragIdx === null || _plDragIdx === dropIdx) return;

  const pl = userPlaylists.find(p => String(p.id) === String(_viewingPlaylistId));
  if (!pl || !pl.items) return;

  const items = [...pl.items];
  const [moved] = items.splice(_plDragIdx, 1);
  items.splice(dropIdx, 0, moved);

  const job_ids = items.map(i => i.job_id);
  await fetch(`/api/playlists/${pl.id}/reorder`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ job_ids }),
  });
  await loadPlaylists();
  renderPlaylistDetail();
  _plDragIdx = null;
}

async function removeSongFromPlaylist(plId, jobId) {
  await fetch(`/api/playlists/${plId}/items/${jobId}`, { method: 'DELETE' });
  await loadPlaylists();
  renderPlaylistDetail();
  renderLibrary();
}

// --- Playback: Play All, Shuffle, auto-advance ---

function playAllPlaylist() {
  const pl = userPlaylists.find(p => String(p.id) === String(_viewingPlaylistId));
  if (!pl || !pl.items || pl.items.length === 0) return;
  _playlistQueue = pl.items.map(i => i.job_id);
  _playlistQueueIdx = 0;
  _playlistQueuePlId = String(pl.id);
  _playFromQueue();
}

function shufflePlaylist() {
  const pl = userPlaylists.find(p => String(p.id) === String(_viewingPlaylistId));
  if (!pl || !pl.items || pl.items.length === 0) return;
  const ids = pl.items.map(i => i.job_id);
  // Fisher-Yates shuffle
  for (let i = ids.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [ids[i], ids[j]] = [ids[j], ids[i]];
  }
  _playlistQueue = ids;
  _playlistQueueIdx = 0;
  _playlistQueuePlId = String(pl.id);
  _playFromQueue();
}

function _playFromQueue() {
  if (_playlistQueueIdx < 0 || _playlistQueueIdx >= _playlistQueue.length) return;
  const jobId = _playlistQueue[_playlistQueueIdx];
  closePlaylists();
  showPlayerForJob(jobId);
  // Update detail view if reopened
  if (_viewingPlaylistId) renderPlaylistDetail();
}

function playFromPlaylist(plId, idx) {
  const pl = userPlaylists.find(p => String(p.id) === String(plId));
  if (!pl || !pl.items) return;
  _playlistQueue = pl.items.map(i => i.job_id);
  _playlistQueueIdx = idx;
  _playlistQueuePlId = String(plId);
  _playFromQueue();
}

function playlistNext() {
  if (_playlistQueueIdx < _playlistQueue.length - 1) {
    _playlistQueueIdx++;
    _playFromQueue();
  }
}

function playlistPrev() {
  if (_playlistQueueIdx > 0) {
    _playlistQueueIdx--;
    _playFromQueue();
  }
}

function _onPlayerEnded() {
  // Auto-advance to next song in playlist queue
  if (_playlistQueue.length > 0 && _playlistQueueIdx < _playlistQueue.length - 1) {
    _playlistQueueIdx++;
    _playFromQueue();
  }
}

// --- Library "+" dropdown (add to playlist) ---

let _activePlaylistDd = null;

function _buildPlaylistDropdownHtml(jobId) {
  const items = userPlaylists.map(pl => {
    const inPlaylist = pl.items && pl.items.some(i => i.job_id === jobId);
    return `<button class="playlist-dropdown-item" onclick="event.stopPropagation(); togglePlaylistItem('${pl.id}', '${jobId}', ${inPlaylist})">
      ${escapeHtml(pl.name)} ${inPlaylist ? '<span class="checkmark">&#10003;</span>' : ''}
    </button>`;
  }).join('');

  return `${items || '<div style="padding:8px 12px;font-size:0.75rem;color:var(--text-muted);">No playlists yet</div>'}
    <div class="playlist-dropdown-create">
      <input type="text" placeholder="New playlist..." id="pl-dd-input-${jobId}" onclick="event.stopPropagation()" onkeydown="if(event.key==='Enter'){event.stopPropagation();createAndAddToPlaylist('${jobId}')}" />
      <button onclick="event.stopPropagation(); createAndAddToPlaylist('${jobId}')">+</button>
    </div>`;
}

function closePlaylistDropdown() {
  if (_activePlaylistDd) {
    _activePlaylistDd.remove();
    _activePlaylistDd = null;
  }
}

function togglePlaylistDropdown(jobId, event) {
  event.stopPropagation();
  if (_activePlaylistDd && _activePlaylistDd.dataset.jobId === jobId) {
    closePlaylistDropdown();
    return;
  }
  closePlaylistDropdown();

  const rect = event.currentTarget.getBoundingClientRect();
  const dd = document.createElement('div');
  dd.className = 'playlist-dropdown';
  dd.dataset.jobId = jobId;
  dd.innerHTML = _buildPlaylistDropdownHtml(jobId);
  dd.onclick = (e) => e.stopPropagation();

  dd.style.top = (rect.bottom + 4) + 'px';
  dd.style.left = rect.left + 'px';

  document.body.appendChild(dd);
  _activePlaylistDd = dd;

  requestAnimationFrame(() => {
    const ddRect = dd.getBoundingClientRect();
    if (ddRect.right > window.innerWidth - 8) {
      dd.style.left = Math.max(8, window.innerWidth - ddRect.width - 8) + 'px';
    }
    if (ddRect.bottom > window.innerHeight - 8) {
      dd.style.top = (rect.top - ddRect.height - 4) + 'px';
    }
  });
}

function _refreshPlaylistDropdown(jobId) {
  if (_activePlaylistDd && _activePlaylistDd.dataset.jobId === jobId) {
    _activePlaylistDd.innerHTML = _buildPlaylistDropdownHtml(jobId);
  }
}

async function togglePlaylistItem(playlistId, jobId, isIn) {
  if (isIn) {
    await fetch(`/api/playlists/${playlistId}/items/${jobId}`, { method: 'DELETE' });
  } else {
    await fetch(`/api/playlists/${playlistId}/items`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ job_id: jobId }),
    });

  await loadPlaylists();
  _refreshPlaylistDropdown(jobId);
}

async function createAndAddToPlaylist(jobId) {
  const input = document.getElementById(`pl-dd-input-${jobId}`);
  const name = input.value.trim();
  if (!name) return;
  const resp = await fetch('/api/playlists', {
    method: 'POST',

  });
  const data = await resp.json();

let currentPlayerJobId = null;

async function loadComments(jobId) {
  currentPlayerJobId = jobId;
  const list = document.getElementById('comments-list');
  const inputRow = document.getElementById('comment-input-row');
  if (currentUser) inputRow.style.display = 'flex';
  else inputRow.style.display = 'none';

  try {
    const resp = await fetch(`/api/jobs/${jobId}/comments`);
    const data = await resp.json();
    const comments = data.comments || [];
    if (comments.length === 0) {
      list.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem;">No comments yet. Be the first!</div>';
      return;
    }
    list.innerHTML = comments.map(c => {
      const initials = (c.user_name || '?').split(/\s/).filter(Boolean).slice(0,2).map(s=>s[0].toUpperCase()).join('');
      const avatar = c.user_picture
        ? `<img src="${escapeHtml(c.user_picture)}" alt="" />`
        : initials;
      const timeAgo = formatTimeAgo(c.created_at);
      const canDelete = currentUser && (String(currentUser.id) === c.user_id || currentUser.role === 'admin');
      return `<div class="comment-item">
        <div class="comment-avatar">${avatar}</div>
        <div class="comment-body">
          <div class="comment-meta">
            <span class="name">${escapeHtml(c.user_name || 'Anonymous')}</span>
            <span>${timeAgo}</span>
          </div>
          <div class="comment-text">${escapeHtml(c.text)}</div>
        </div>
        ${canDelete ? `<button class="comment-delete" onclick="deleteComment('${c.id}')" title="Delete">&times;</button>` : ''}
      </div>`;
    }).join('');
  } catch (e) {
    list.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem;">Failed to load comments.</div>';
  }
}

function formatTimeAgo(isoStr) {
  if (!isoStr) return '';
  const diff = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 30) return days + 'd ago';
  return new Date(isoStr).toLocaleDateString();
}

async function postComment() {
  if (!currentUser) { window.location.href = '/login'; return; }
  const input = document.getElementById('comment-input');
  const text = input.value.trim();
  if (!text || !currentPlayerJobId) return;
  try {
    const resp = await fetch(`/api/jobs/${currentPlayerJobId}/comments`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    if (!resp.ok) return;
    input.value = '';
    await loadComments(currentPlayerJobId);
  } catch (e) {}
}

async function deleteComment(commentId) {
  await fetch(`/api/comments/${commentId}`, { method: 'DELETE' });
  if (currentPlayerJobId) await loadComments(currentPlayerJobId);
}


// ---- Invite Friends ----

let inviteEmails = [];

function openInvite() {
  inviteEmails = [];
  renderInviteTags();
  document.getElementById('invite-email-input').value = '';
  document.getElementById('invite-status').style.display = 'none';
  document.getElementById('invite-overlay').classList.remove('hidden');
  document.getElementById('user-dropdown').classList.remove('open');
  loadSentInvitations();
}

function closeInvite() {
  document.getElementById('invite-overlay').classList.add('hidden');
}

function addInviteEmail() {
  const input = document.getElementById('invite-email-input');
  const email = input.value.trim().toLowerCase();
  if (!email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) return;
  if (inviteEmails.includes(email)) return;
  inviteEmails.push(email);
  input.value = '';
  renderInviteTags();
}

function removeInviteEmail(email) {
  inviteEmails = inviteEmails.filter(e => e !== email);
  renderInviteTags();
}

function renderInviteTags() {
  const container = document.getElementById('invite-tags');
  container.innerHTML = inviteEmails.map(e =>
    `<span class="invite-tag">${escapeHtml(e)} <button class="remove-invite" onclick="removeInviteEmail('${e}')">&times;</button></span>`
  ).join('');
  document.getElementById('invite-send-btn').style.display = inviteEmails.length > 0 ? 'block' : 'none';
}

async function sendInvitations() {
  if (inviteEmails.length === 0) return;
  const btn = document.getElementById('invite-send-btn');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  try {
    const resp = await fetch('/api/invitations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ emails: inviteEmails }),
    });
    const data = await resp.json();
    const statusEl = document.getElementById('invite-status');
    if (!resp.ok) {
      statusEl.style.color = 'var(--error)';
      statusEl.textContent = data.detail || 'Failed to send invitations.';
      statusEl.style.display = 'block';
    } else {
      let msg = data.count > 0
        ? `${data.count} invitation${data.count !== 1 ? 's' : ''} sent!`
        : 'No invitations sent.';
      const skipped = data.skipped || [];
      if (skipped.length > 0) {
        msg += '\n' + skipped.map(s => `${s.email}: ${s.reason}`).join('\n');
        statusEl.style.color = data.count > 0 ? 'var(--success)' : 'var(--error)';
      } else {
        statusEl.style.color = 'var(--success)';
      }
      statusEl.style.whiteSpace = 'pre-line';
      statusEl.textContent = msg;
      statusEl.style.display = 'block';
      updateRemainingCount(data.remaining);
    }
    inviteEmails = [];
    renderInviteTags();
    loadSentInvitations();
  } catch (e) {}
  btn.disabled = false;
  btn.textContent = 'Send Invitations';
}

function updateRemainingCount(remaining) {
  const el = document.getElementById('invite-remaining');
  if (remaining === null || remaining === undefined) {
    el.textContent = 'Unlimited invitations';
  } else {
    el.textContent = `${remaining} invitation${remaining !== 1 ? 's' : ''} remaining`;
    el.style.color = remaining <= 1 ? 'var(--error)' : 'var(--text-muted)';
  }
}

async function loadSentInvitations() {
  const container = document.getElementById('invite-sent-list');
  try {
    const resp = await fetch('/api/invitations');
    const data = await resp.json();
    const invites = data.invitations || [];
    updateRemainingCount(data.remaining);
    if (invites.length === 0) {
      container.innerHTML = '';
      return;
    }
    const baseUrl = window.location.origin;
    container.innerHTML = `
      <div style="font-size:0.75rem;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;">Previously Sent</div>
      ${invites.map(i => {
        const link = i.token ? `${baseUrl}/login?invite=${i.token}` : null;
        const expired = i.expires_at && new Date(i.expires_at) < new Date();
        const statusLabel = i.status === 'accepted' ? 'accepted' : expired ? 'expired' : 'pending';
        const statusClass = i.status === 'accepted' ? 'accepted' : expired ? 'expired' : 'pending';
        return `
        <div class="invite-sent-item" style="flex-direction:column;align-items:flex-start;gap:4px;">
          <div style="display:flex;justify-content:space-between;width:100%;align-items:center;">
            <span class="email">${escapeHtml(i.email)}</span>
            <span class="status ${statusClass}" style="${expired && i.status !== 'accepted' ? 'color:var(--error);' : ''}">${statusLabel}</span>
          </div>
          ${i.status === 'pending' && !expired && link ? `
            <div style="display:flex;gap:6px;width:100%;align-items:center;">
              <input type="text" readonly value="${escapeHtml(link)}" style="flex:1;padding:4px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-size:0.7rem;font-family:inherit;" onclick="this.select()" />
              <button onclick="navigator.clipboard.writeText('${escapeHtml(link)}');this.textContent='Copied!';setTimeout(()=>this.textContent='Copy',1500)" style="padding:4px 10px;background:var(--bg-hover);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:0.7rem;cursor:pointer;font-family:inherit;white-space:nowrap;">Copy</button>
            </div>
          ` : ''}
        </div>`;
      }).join('')}
    `;
  } catch (e) { container.innerHTML = ''; }
}

      <option value="recent" ${s === 'recent' ? 'selected' : ''}>Most Recent</option>
    </select>
    ${currentUser && userCan('can_request_songs') ? '<button class="btn-primary" style="margin-left:auto;padding:6px 16px;font-size:0.8rem;white-space:nowrap;" onclick="openRequestForm()">+ Request a Song</button>' : ''}
  `;
}

function renderWishlistGrid() {
  const main = document.getElementById('library-main');
  const query = wishlistFilters.search.toLowerCase();

  let filtered = wishlistItems.filter(item => {
    if (query) {
      const haystack = [item.title, item.artist, item.note].filter(Boolean).join(' ').toLowerCase();
      if (!haystack.includes(query)) return false;
    }
    return true;
  });

  if (wishlistFilters.sort === 'votes') {
    filtered.sort((a, b) => b.vote_count - a.vote_count);
  } else {
    filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  }

  if (filtered.length === 0) {
    main.innerHTML = `<div class="library-results-count">${wishlistItems.length} requests, 0 matching</div>
      <p style="color:var(--text-dim);text-align:center;padding:40px;">No song requests yet. Be the first!</p>`;
    return;
  }

  const grid = filtered.map(item => {
    const thumb = item.thumbnail
      ? `<img class="library-thumb" src="${item.thumbnail}" alt="" loading="lazy" />`
      : `<div class="library-thumb" style="display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:2rem;">&#9835;</div>`;
    const noteSnippet = item.note ? `<p style="font-size:0.72rem;color:var(--text-dim);margin:2px 0 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic;">"${escapeHtml(item.note)}"</p>` : '';
    const votedStyle = item.user_voted ? 'color:var(--accent);border-color:var(--accent);' : '';
    const fulfilledBadge = item.status === 'fulfilled' && item.fulfilled_by_job_id
      ? `<span style="font-size:0.7rem;color:var(--accent);cursor:pointer;" onclick="showPlayerForJob('${item.fulfilled_by_job_id}')">&#9654; Ready</span>`
      : '';
    return `
      <div class="library-item">
        <div class="library-item-header">${thumb}</div>
        <div class="library-info">
          <h3>${escapeHtml(item.title)}</h3>
          ${item.artist ? `<div class="channel">${escapeHtml(item.artist)}</div>` : ''}
          ${noteSnippet}
          <div class="meta" style="display:flex;align-items:center;justify-content:space-between;margin-top:4px;">
            <span>by ${escapeHtml(item.user_name || 'Anonymous')}</span>
            <span style="display:flex;align-items:center;gap:6px;">
              ${fulfilledBadge}
              <button onclick="event.stopPropagation(); toggleWishlistVote('${item.id}')"
                style="background:none;border:1px solid var(--border);border-radius:6px;padding:2px 8px;cursor:pointer;font-size:0.78rem;color:var(--text-dim);font-family:inherit;${votedStyle}">&#9650; ${item.vote_count}</button>
            </span>
          </div>
        </div>
      </div>`;
  }).join('');

  main.innerHTML = `<div class="library-results-count">${filtered.length} request${filtered.length !== 1 ? 's' : ''}</div>
    <div class="library-grid">${grid}</div>`;
}

async function toggleWishlistVote(itemId) {
  try {
    const resp = await fetch(`/api/wishlist/${itemId}/vote`, { method: 'POST' });
    if (!resp.ok) { const d = await resp.json().catch(() => ({})); showAlert(d.detail || 'Vote failed'); return; }
    const data = await resp.json();
    const item = wishlistItems.find(i => i.id === itemId);
    if (item) { item.vote_count = data.vote_count; item.user_voted = data.user_voted; }
    renderWishlistGrid();
  } catch (e) { showAlert('Error: ' + e.message); }
}

function openRequestForm() {
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-box" style="max-width:420px;text-align:left;">
      <h3 style="color:var(--text-bright);margin:0 0 12px;font-size:1rem;">Request a Song</h3>
      <label style="font-size:0.78rem;color:var(--text-dim);display:block;margin-bottom:3px;">YouTube URL (optional)</label>
      <input type="text" id="wish-url" placeholder="https://youtube.com/watch?v=..." style="width:100%;padding:6px 8px;margin-bottom:6px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:0.85rem;" />
      <div id="wish-meta-status" style="font-size:0.7rem;color:var(--text-dim);margin-bottom:6px;min-height:1em;"></div>
      <label style="font-size:0.78rem;color:var(--text-dim);display:block;margin-bottom:3px;">Song Title *</label>
      <input type="text" id="wish-title" placeholder="Song title" style="width:100%;padding:6px 8px;margin-bottom:8px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:0.85rem;" />
      <label style="font-size:0.78rem;color:var(--text-dim);display:block;margin-bottom:3px;">Artist</label>
      <input type="text" id="wish-artist" placeholder="Artist name" style="width:100%;padding:6px 8px;margin-bottom:8px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:0.85rem;" />
      <label style="font-size:0.78rem;color:var(--text-dim);display:block;margin-bottom:3px;">Note</label>
      <input type="text" id="wish-note" placeholder="Why you want this song..." maxlength="200" style="width:100%;padding:6px 8px;margin-bottom:14px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:0.85rem;" />
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button class="admin-btn" onclick="this.closest('.confirm-overlay').remove()">Cancel</button>
        <button class="btn-primary" style="padding:6px 20px;" onclick="submitWishlistRequest()">Submit</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  document.getElementById('wish-url').addEventListener('blur', async function() {
    const url = this.value.trim();
    if (!url) return;
    const status = document.getElementById('wish-meta-status');
    status.textContent = 'Fetching metadata...';
    status.style.color = 'var(--text-dim)';
    try {
      const resp = await fetch('/api/wishlist/preview?' + new URLSearchParams({ url }));
      if (resp.ok) {
        const meta = await resp.json();
        if (meta.title && !document.getElementById('wish-title').value) document.getElementById('wish-title').value = meta.title;
        if (meta.channel && !document.getElementById('wish-artist').value) document.getElementById('wish-artist').value = meta.channel;
        status.textContent = 'Metadata loaded';
        status.style.color = 'var(--success, #6b8)';
      } else {
        status.textContent = 'Could not fetch metadata - fill in manually';
      }
    } catch (e) {
      status.textContent = 'Could not fetch metadata';
    }
  });
}

async function submitWishlistRequest() {
  const url = document.getElementById('wish-url').value.trim();
  const title = document.getElementById('wish-title').value.trim();
  const artist = document.getElementById('wish-artist').value.trim();
  const note = document.getElementById('wish-note').value.trim();

  if (!title && !url) { showAlert('Please enter a song title or YouTube URL.'); return; }

  try {
    const resp = await fetch('/api/wishlist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: url || null, title: title || null, artist: artist || null, note: note || null }),
    });
    if (!resp.ok) { const d = await resp.json().catch(() => ({})); showAlert(d.detail || 'Failed to submit'); return; }
    document.querySelector('.confirm-overlay')?.remove();
    loadWishlist();
  } catch (e) { showAlert('Error: ' + e.message); }
}


async function init() {
  // Check for shared watch link — allow without login
  const isSharedLink = window.location.hash.match(/^#\/watch\/(.+)$/);

  // Load current user (optional for shared links)
  try {
    const authResp = await fetch('/api/auth/me');
    if (authResp.ok) {
      const authData = await authResp.json();
      currentUser = authData.user;
      renderUserMenu();
    } else if (!isSharedLink) {
      window.location.href = '/login';
      return;
    }
  } catch (e) {
    if (!isSharedLink) { window.location.href = '/login'; return; }
  }

  // Load public settings (allowed modes, feature flags)
  try {
    const sResp = await fetch('/api/settings/public');
    if (sResp.ok) appSettings = await sResp.json();
  } catch (e) {}
  applyAppSettings();

  // Load both panes on startup (only if authenticated)
  if (currentUser) {
    await loadPlaylists();
    loadLibrary();
  }

  // Load queue state
  try {
    const resp = await fetch('/api/queue');
    const data = await resp.json();
    productionQueue = data.queue || [];
    currentJob = data.job || null;
    _diskQuotaExceeded = false;
    renderQueue();
    if (productionQueue.length > 0) startQueuePolling();
  } catch (e) {}

  // Start background polling for cross-user updates
  if (currentUser) startBackgroundPolling();

  // Check for hash-based deep link: #/watch/job-id
  if (isSharedLink) {
    await showPlayerForJob(isSharedLink[1]);
  }
}

init();
</script>
</body>
</html>
