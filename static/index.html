<script>
const STEP_NAMES_KARAOKE = ['Downloading', 'Separating vocals', 'Transcribing lyrics', 'Building subtitles', 'Composing video'];
const STEP_NAMES_SUBTITLED = ['Downloading audio', 'Transcribing', 'Translating'];
const STEP_NAMES_BOTH = ['Downloading', 'Separating vocals', 'Transcribing lyrics', 'Building subtitles', 'Composing video', 'Translating'];
let STEP_NAMES = STEP_NAMES_KARAOKE;

function getStepNamesForMode(mode) {
  if (mode === 'subtitled') return STEP_NAMES_SUBTITLED;
  if (mode === 'both') return STEP_NAMES_BOTH;
  return STEP_NAMES_KARAOKE;
}
let pollInterval = null;
let currentJob = null;       // active queue job (from polling)
let _playerItem = null;      // library item shown in the player overlay
let lyricsData = null;
let activeMediaEl = null;
let paneState = 'default'; // 'default' (30/70) | 'lib-expanded' (0/100)

// ---- Pane navigation ----

function stopAllMedia() {
  _stopLyricsRaf();
  if (activeMediaEl) {
    activeMediaEl.pause();
    activeMediaEl.removeEventListener('timeupdate', onTimeUpdate);
    activeMediaEl.removeEventListener('play', onMediaPlay);
    activeMediaEl.removeEventListener('pause', onMediaPause);
    activeMediaEl.removeEventListener('seeked', onMediaSeeked);
    activeMediaEl.removeEventListener('ended', _onPlayerEnded);
    activeMediaEl.src = '';
    activeMediaEl = null;
  }
  if (typeof destroyVocalsSync === 'function') destroyVocalsSync();
  if (typeof destroyYtPlayer === 'function') destroyYtPlayer();
}

// Sync lyrics pane height to player main area
let _playerResizeObs = null;
function _syncPlayerHeight() {
  if (_playerResizeObs) _playerResizeObs.disconnect();
  const main = document.querySelector('.player-overlay:not(.hidden) .player-main');
  const side = document.querySelector('.player-overlay:not(.hidden) .player-comments-side');
  if (!main || !side) return;
  const update = () => {
    const h = main.offsetHeight;
    if (h > 0) side.style.maxHeight = h + 'px';
  };
  update();
  _playerResizeObs = new ResizeObserver(update);
  _playerResizeObs.observe(main);
}

function closePlayer() {
  const overlay = document.getElementById('player-overlay');
  if (!overlay || overlay.classList.contains('hidden')) return;
  stopAllMedia();
  _playerItem = null;
  if (_playerResizeObs) { _playerResizeObs.disconnect(); _playerResizeObs = null; }
  overlay.classList.add('hidden');
  if (window.location.hash.startsWith('#/watch/')) {
    history.replaceState(null, '', window.location.pathname);
  }
  document.getElementById('overlay-title').textContent = '';
  document.getElementById('overlay-tabs').innerHTML = '';
  document.getElementById('overlay-player-area').innerHTML = '';
  document.getElementById('overlay-lyrics-panel').innerHTML = '';
  document.getElementById('overlay-analysis-panel').innerHTML = '';
  document.getElementById('comments-list').innerHTML = '';
  document.getElementById('comment-input').value = '';
  document.getElementById('lyrics-tabs').style.display = 'none';
  currentPlayerJobId = null;
}

function togglePlayerComments() {
  const panel = document.getElementById('player-comments-side');
  if (!panel) return;
  panel.classList.toggle('collapsed');
}

let _currentLyricsTab = 'live';
let _analysisCache = {}; // jobId -> analysis text

function switchLyricsTab(tab) {
  _currentLyricsTab = tab;
  const liveTab = document.getElementById('tab-live-lyrics');
  const btlTab = document.getElementById('tab-btl');
  const lyricsPanel = document.getElementById('overlay-lyrics-panel');
  const analysisPanel = document.getElementById('overlay-analysis-panel');

  if (tab === 'live') {
    liveTab.classList.add('active');
    btlTab.classList.remove('active');
    lyricsPanel.classList.remove('hidden');
    analysisPanel.classList.add('hidden');
  } else {
    liveTab.classList.remove('active');
    btlTab.classList.add('active');
    lyricsPanel.classList.add('hidden');
    analysisPanel.classList.remove('hidden');
    loadAnalysis();
  }
}

async function loadAnalysis() {
  const panel = document.getElementById('overlay-analysis-panel');
  const jobId = currentPlayerJobId;
  if (!jobId) return;

  // Use cache if available
  if (_analysisCache[jobId]) {
    panel.innerHTML = _renderAnalysis(_analysisCache[jobId]);
    return;
  }

  // Show loading only after a delay — cached responses return before it appears
  const loadingTimer = setTimeout(() => {
    if (_currentLyricsTab === 'btl' && currentPlayerJobId === jobId) {
      panel.innerHTML = '<div class="analysis-loading">Decoding the meaning...</div>';
    }
  }, 300);

  try {
    const resp = await fetch(`/api/jobs/${jobId}/analysis`);
    clearTimeout(loadingTimer);
    if (!resp.ok) throw new Error('Failed to load');
    const data = await resp.json();
    _analysisCache[jobId] = data;
    if (_currentLyricsTab === 'btl' && currentPlayerJobId === jobId) {
      panel.innerHTML = _renderAnalysis(data);
    }
  } catch (e) {
    clearTimeout(loadingTimer);
    panel.innerHTML = '<div class="analysis-loading">Could not load analysis.</div>';
  }
}

function _renderAnalysis(data) {
  const songInfo = data.song_info || '';
  const text = data.analysis || '';
  const escaped = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const formatted = escaped
    .replace(/&quot;([^&]+?)&quot;/g, '<span class="analysis-lyric">&ldquo;$1&rdquo;</span>')
    .replace(/"([^"]+?)"/g, '<span class="analysis-lyric">&ldquo;$1&rdquo;</span>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
  const jobId = currentPlayerJobId || '';
  const rerunLink = jobId ? `<a class="analysis-rerun" onclick="rerunAnalysis('${jobId}')">Analyze again</a>` : '';
  const header = songInfo
    ? `<div class="analysis-header"><span class="analysis-song-title">${escapeHtml(songInfo)}</span>${rerunLink}</div>`
    : (rerunLink ? `<div class="analysis-header">${rerunLink}</div>` : '');
  return header + formatted;
}

async function rerunAnalysis(jobId) {
  const panel = document.getElementById('overlay-analysis-panel');
  delete _analysisCache[jobId];
  panel.innerHTML = '<div class="analysis-loading">Re-analyzing...</div>';
  try {
    // Clear cached analysis in DB first
    await fetch(`/api/jobs/${jobId}/analysis/rerun`, { method: 'POST' });
    const resp = await fetch(`/api/jobs/${jobId}/analysis`);
    if (!resp.ok) throw new Error('Failed');
    const data = await resp.json();
    _analysisCache[jobId] = data;
    if (_currentLyricsTab === 'btl' && currentPlayerJobId === jobId) {
      panel.innerHTML = _renderAnalysis(data);
    }
  } catch (e) {
    panel.innerHTML = '<div class="analysis-loading">Failed to re-analyze.</div>';
  }
}

function expandProduction() {
  // Show production pane (back to default 30/70)
  const el = document.getElementById('split-pane');
  paneState = 'default';
  el.className = 'split-pane';
}

function expandLibrary() {
  // Hide production pane (0/100)
  const el = document.getElementById('split-pane');
  paneState = paneState === 'lib-expanded' ? 'default' : 'lib-expanded';
  el.className = 'split-pane' + (paneState !== 'default' ? ' ' + paneState : '');
}

// ---- State management ----

// ---- Queue State ----
let productionQueue = [];
let queuePollInterval = null;
let _diskQuotaExceeded = false;

function startQueuePolling() {
  if (queuePollInterval) return;
  queuePollInterval = setInterval(pollQueue, 2000);
  pollQueue();
}

function stopQueuePolling() {
  if (queuePollInterval) { clearInterval(queuePollInterval); queuePollInterval = null; }
}

async function pollQueue() {
  // Skip if a reorder is in progress (prevent reverting the UI)
  if (_suppressPollUntil && Date.now() < _suppressPollUntil) return;
  try {
    const resp = await fetch('/api/queue');
    const data = await resp.json();
    const oldProcessingId = productionQueue.find(i => i.status === 'processing')?.id;
    const oldLen = productionQueue.length;
    productionQueue = data.queue || [];
    currentJob = data.job || null;
    _diskQuotaExceeded = false;
    renderQueue();

    // If a processing item just finished or queue shrunk, refresh library
    const newProcessingId = productionQueue.find(i => i.status === 'processing')?.id;
    if ((oldProcessingId && oldProcessingId !== newProcessingId) ||
        (productionQueue.length < oldLen)) {
      await loadLibrary();
    }

    // If queue grew (another user added items), start fast polling
    if (productionQueue.length > oldLen) startQueuePolling();

    // Stop fast polling if queue is empty (background poll continues)
    if (productionQueue.length === 0) stopQueuePolling();
  } catch (e) {}
}

// Background refresh: quietly pick up changes from other users
let _bgPollInterval = null;
let _lastLibraryCount = -1;

function startBackgroundPolling() {
  if (_bgPollInterval) return;
  _bgPollInterval = setInterval(backgroundPoll, 30000);
}

async function backgroundPoll() {
  // Skip if a player overlay is open (don't disrupt playback)
  const playerOpen = !document.getElementById('player-overlay')?.classList.contains('hidden');
  if (playerOpen) return;

  try {
    // Refresh queue state (picks up items added by other users)
    const qResp = await fetch('/api/queue');
    if (qResp.ok) {
      const qData = await qResp.json();
      const hadItems = productionQueue.length > 0;
      productionQueue = qData.queue || [];
      currentJob = qData.job || null;
      _diskQuotaExceeded = false;
      renderQueue();
      // Start fast polling if new items appeared
      if (!hadItems && productionQueue.length > 0) startQueuePolling();
    }

    // Refresh library if item count changed (new songs produced)
    const lResp = await fetch('/api/library');
    if (lResp.ok) {
      const lData = await lResp.json();
      const newCount = (lData.items || []).length;
      if (_lastLibraryCount >= 0 && newCount !== _lastLibraryCount) {
        libraryItems = lData.items || [];
        if (!_wishlistActive) {
          renderLibraryFilterBar();
          renderLibraryGrid();
        }
      }
      _lastLibraryCount = newCount;
    }
  } catch (e) {}
}

async function addToQueue() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;
  if (!/youtube\.com\/watch|youtu\.be\//.test(url)) {
    showAlert('Please enter a valid YouTube URL');
    return;
  }

  const mode = getSelectedMode();
  const languages = (mode === 'subtitled' || mode === 'both') ? [...selectedLanguages] : [];
  if ((mode === 'subtitled' || mode === 'both') && languages.length === 0) {
    showAlert('Please add at least one subtitle language.');
    return;
  }
  if (mode === 'karaoke' && !document.getElementById('mode-karaoke').checked) {
    showAlert('Please select at least one production mode.');
    return;
  }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.classList.add('loading');

  try {
    const body = { url, mode };
    if (languages.length > 0) body.languages = languages;
    const resp = await fetch('/api/queue', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!resp.ok) throw new Error('Failed to add to queue');
    const data = await resp.json();
    productionQueue = data.queue || [];
    renderQueue();
    document.getElementById('url-input').value = '';
    startQueuePolling();
  } catch (e) {
    showAlert('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.classList.add('loaded');
    setTimeout(() => btn.classList.remove('loaded'), 400);
  }
}

async function startQueue() {
  try {
    await fetch('/api/queue/start', { method: 'POST' });
    startQueuePolling();
    pollQueue();
  } catch (e) {}
}

async function removeQueueItem(itemId) {
  try {
    const resp = await fetch(`/api/queue/${itemId}`, { method: 'DELETE' });
    const data = await resp.json();
    productionQueue = data.queue || [];
    renderQueue();
  } catch (e) {}
}

async function pauseQueueItem(itemId) {
  try {
    const resp = await fetch(`/api/queue/${itemId}/pause`, { method: 'POST' });
    if (resp.ok) {
      const data = await resp.json();
      // Update local state for immediate UI feedback
      const item = productionQueue.find(i => i.id === itemId);
      if (item) item.pause_requested = data.pause_requested;
      renderQueue();
    }
  } catch (e) {}
}

async function moveToWishlist(itemId) {
  if (!await showConfirm('Move this item from the queue to Requests?')) return;
  try {
    const resp = await fetch(`/api/queue/${itemId}/request`, { method: 'POST' });
    if (!resp.ok) { const d = await resp.json().catch(() => ({})); showAlert(d.detail || 'Failed to move'); return; }
    const data = await resp.json();
    productionQueue = data.queue || [];
    renderQueue();
  } catch (e) { showAlert('Error: ' + e.message); }
}

async function resumeQueueItem(itemId) {
  try {
    await fetch(`/api/queue/${itemId}/resume`, { method: 'POST' });
    startQueuePolling();
  } catch (e) {}
}


function renderQueue() {
  const list = document.getElementById('queue-list');

  // Disk quota warning
  const quotaWarning = _diskQuotaExceeded
    ? `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;margin-bottom:8px;background:rgba(224,112,80,0.1);border:1px solid rgba(224,112,80,0.3);border-radius:8px;font-size:0.78rem;color:var(--error);">
        <span style="font-size:1.2rem;">&#9888;</span>
        <span>Disk space limit reached. Free up songs from the Jukebox to continue production, or contact the Administrator.</span>
      </div>`
    : '';

  if (productionQueue.length === 0) {
    list.innerHTML = quotaWarning + '<p style="color:#4a3f35;font-size:0.8rem;text-align:center;margin-top:20px;">Queue is empty. Add a URL above to get started.</p>';
    return;
  }

  // If only the processing item changed, update it in-place to preserve animations
  const processingItem = productionQueue.find(q => q.status === 'processing');
  if (processingItem && !_forceFullRender) {
    const existingEl = list.querySelector(`.queue-item[data-id="${processingItem.id}"]`);
    const wasPauseRequested = existingEl?.querySelector('[title="Cancel pause"]') !== null;
    const isPauseNow = processingItem.pause_requested || false;
    if (existingEl && existingEl.classList.contains('processing') && list.children.length === productionQueue.length && wasPauseRequested === isPauseNow) {
      // Update just the dynamic parts in-place
      const totalSteps = getStepNamesForMode(processingItem.mode).length;
      const stepNum = processingItem.step || 0;
      const stepProg = processingItem.step_progress || 0;
      const overallPct = totalSteps > 0 ? Math.round(((stepNum - 1 + stepProg) / totalSteps) * 100) : 0;
      const barPct = overallPct;
      const langSuffix = processingItem.languages?.length ? ' · ' + processingItem.languages.map(c => LANG_NAMES_ALL[c] || c).join(', ') : '';
      const modeLabel = processingItem.mode === 'both' ? 'Karaoke + Subtitles' + langSuffix : (processingItem.mode === 'subtitled' ? 'Subtitles' + langSuffix : 'Karaoke');
      const statusLine = stepNum > 0 ? `${stepNum}/${totalSteps} ${processingItem.step_name}` : processingItem.step_name || modeLabel;

      const pieEl = existingEl.querySelector('.queue-pie');
      if (pieEl) { pieEl.style.setProperty('--pct', Math.max(overallPct, 2) + '%'); pieEl.querySelector('.queue-pie-pct').textContent = overallPct + '%'; }
      const metaEl = existingEl.querySelector('.queue-item-meta');
      if (metaEl) metaEl.innerHTML = statusLine + (processingItem.added_by ? ' &middot; ' + escapeHtml(processingItem.added_by) : '');
      const fillEl = existingEl.querySelector('.queue-progress-fill');
      if (fillEl) fillEl.style.width = Math.max(barPct, 2) + '%';
      return;
    }
  }

  list.innerHTML = productionQueue.map((item, i) => {
    const isProcessing = item.status === 'processing';
    const isPaused = item.status === 'paused';
    const isQueued = item.status === 'queued';
    const wasRetry = item.was_failed;

    const langSuffix = item.languages?.length ? ' · ' + item.languages.map(c => LANG_NAMES_ALL[c] || c).join(', ') : '';
    const modeLabel = item.mode === 'both'
      ? 'Karaoke + Subtitles' + langSuffix
      : (item.mode === 'subtitled' ? 'Subtitles' + langSuffix : 'Karaoke');

    let statusLine = modeLabel;
    if (isProcessing && item.step_name) {
      const totalSteps = getStepNamesForMode(item.mode).length;
      const stepNum = item.step || 0;
      statusLine = stepNum > 0 ? `${stepNum}/${totalSteps} ${item.step_name}` : item.step_name;
    }
    if (isPaused) statusLine = 'Paused — ' + modeLabel;

    let icon = '';
    if (isProcessing) {
      const totalSteps = getStepNamesForMode(item.mode).length;
      const stepNum = item.step || 0;
      const stepProg = item.step_progress || 0;
      const overallPct = totalSteps > 0 ? Math.round(((stepNum - 1 + stepProg) / totalSteps) * 100) : 0;
      icon = `<div class="queue-pie" style="--pct:${Math.max(overallPct, 2)}%"><span class="queue-pie-pct">${overallPct}%</span></div>`;
    } else if (isPaused) {
      icon = '&#9646;&#9646;';
    } else if (wasRetry) {
      icon = '!';
    }

    // For queued items, put drag handle inside the icon slot so text aligns with processing items
    if (isQueued && !icon) {
      icon = '<span class="queue-drag-handle" title="Drag to reorder">&#8801;</span>';
    }
    const dragHandle = '';

    let progressBar = '';
    if (isProcessing) {
      const totalSteps = getStepNamesForMode(item.mode).length;
      const stepNum = item.step || 0;
      const stepProg = item.step_progress || 0;
      const barPct = totalSteps > 0 ? Math.round(((stepNum - 1 + stepProg) / totalSteps) * 100) : 0;
      progressBar = `<div class="queue-progress"><div class="queue-progress-fill" style="width:${Math.max(barPct, 2)}%"></div></div>`;
    }

    const noneProcessing = !productionQueue.some(q => q.status === 'processing');
    const isTopQueued = isQueued && i === productionQueue.findIndex(q => q.status === 'queued');

    let actions = '';
    const isPauseRequested = isProcessing && item.pause_requested;
    if (isProcessing && isPauseRequested) {
      actions = `<button class="queue-action-btn" onclick="pauseQueueItem('${item.id}')" title="Cancel pause" style="color:var(--accent);font-size:0.65rem;white-space:nowrap;">Pausing...</button>`;
    } else if (isProcessing) {
      actions = `<button class="queue-action-btn" onclick="pauseQueueItem('${item.id}')" title="Pause">&#9208;</button>`;
    } else if (isPaused) {
      actions = `<button class="queue-action-btn" onclick="resumeQueueItem('${item.id}')" title="Resume">&#9654;</button>`;
    } else if (isTopQueued && noneProcessing) {
      actions = `<button class="queue-action-btn" onclick="startQueue()" title="Start" style="color:var(--accent);">&#9654;</button>`;
    }
    if (!isProcessing) {
      actions += `<button class="queue-action-btn remove" onclick="removeQueueItem('${item.id}')" title="Remove">&times;</button>`;
    }

    return `
      <div class="queue-item ${item.status}" draggable="${isQueued}" data-id="${item.id}" data-index="${i}"
           ondragstart="onQueueDragStart(event)" ondragover="onQueueDragOver(event)" ondrop="onQueueDrop(event)" ondragend="onQueueDragEnd(event)" ondragleave="onQueueDragLeave(event)">
        ${dragHandle}
        <div class="queue-item-icon">${icon}</div>
        <div class="queue-item-info">
          <div class="queue-item-title">${escapeHtml(item.title || 'Loading...')}</div>
          <div class="queue-item-meta">${statusLine}${item.added_by ? ' &middot; ' + escapeHtml(item.added_by) : ''}${!isProcessing && currentUser && item.added_by_id === String(currentUser.id) && appSettings.feature_wishlist ? ` &middot; <a style="color:var(--accent);cursor:pointer;font-size:0.7rem;" onclick="event.stopPropagation(); moveToWishlist('${item.id}')">Request it</a>` : ''}</div>
          ${progressBar}
        </div>
        <div class="queue-item-actions">${actions}</div>
      </div>
    `;
  }).join('');

  // Prepend quota warning if needed
  if (_diskQuotaExceeded) list.innerHTML = quotaWarning + list.innerHTML;
  _forceFullRender = false;
}

// ---- Queue Drag and Drop ----

let _draggedIndex = null;

function onQueueDragStart(e) {
  const item = e.currentTarget;
  _draggedIndex = parseInt(item.dataset.index);
  item.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', _draggedIndex);
}

function onQueueDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const item = e.currentTarget;
  const idx = parseInt(item.dataset.index);
  // Don't allow dropping on the processing item
  if (productionQueue[idx]?.status === 'processing') return;
  // Remove drag-over from all items
  document.querySelectorAll('.queue-item.drag-over').forEach(el => el.classList.remove('drag-over'));
  if (idx !== _draggedIndex) item.classList.add('drag-over');
}

function onQueueDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onQueueDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.queue-item.drag-over').forEach(el => el.classList.remove('drag-over'));
  _draggedIndex = null;
}

let _suppressPollUntil = 0;
let _forceFullRender = false;

async function onQueueDrop(e) {
  e.preventDefault();
  const targetIndex = parseInt(e.currentTarget.dataset.index);
  e.currentTarget.classList.remove('drag-over');

  if (_draggedIndex === null || _draggedIndex === targetIndex) return;
  if (productionQueue[targetIndex]?.status === 'processing') return;

  // Reorder locally for instant feedback
  const [moved] = productionQueue.splice(_draggedIndex, 1);
  productionQueue.splice(targetIndex, 0, moved);
  _forceFullRender = true;
  renderQueue();

  // Suppress polling while we sync with server (prevent revert)
  _suppressPollUntil = Date.now() + 5000;

  // Sync with server
  const order = productionQueue.map(item => item.id);
  try {
    const resp = await fetch('/api/queue/reorder', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ order }),
    });
    if (resp.ok) {
      const data = await resp.json();
      productionQueue = data.queue || [];
      renderQueue();
    }
  } catch (e) {}
  _suppressPollUntil = 0;
  _draggedIndex = null;
}

async function submitJob(skipDuplicateCheck = false) {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;
  if (!/youtube\.com\/watch|youtu\.be\//.test(url)) {
    showAlert('Please enter a valid YouTube URL');
    return;
  }

  const mode = getSelectedMode();
  const languages = (mode === 'subtitled' || mode === 'both') ? [...selectedLanguages] : [];

  if ((mode === 'subtitled' || mode === 'both') && languages.length === 0) {
    showAlert('Please add at least one subtitle language.');
    return;
  }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.classList.add('loading');

  try {
    // Check if this URL already exists in the library for this mode
    if (!skipDuplicateCheck) {
      const checkResp = await fetch(`/api/library/check-url?url=${encodeURIComponent(url)}&mode=${mode}`);
      if (checkResp.ok) {
        const checkData = await checkResp.json();
        if (checkData.found) {
          btn.disabled = false;
          btn.classList.remove('loading');
    btn.classList.add('loaded');
    setTimeout(() => btn.classList.remove('loaded'), 400);
          showDuplicateDialog(checkData.item);
          return;
        }
      }
    }

    // Set mode-aware step names
    STEP_NAMES = getStepNamesForMode(mode);

    // loading animation already active
    const body = { url, mode };
    if (languages.length > 0) body.languages = languages;
    const resp = await fetch('/api/jobs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (resp.status === 409) {
      showAlert('A job is already running. Please wait for it to finish.');
      return;
    }
    if (!resp.ok) throw new Error('Failed to start job');
    const data = await resp.json();
    currentJob = data.job;
    showProcessing();
  } catch (e) {
    showAlert('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.classList.add('loaded');
    setTimeout(() => btn.classList.remove('loaded'), 400);
  }
}

// ---- Processing State ----

function showProcessing() {
  showState('processing');
  // Set step names based on job mode
  const jobMode = currentJob.mode || 'karaoke';
  STEP_NAMES = getStepNamesForMode(jobMode);
  const titleEl = document.getElementById('processing-title');
  titleEl.textContent = currentJob.title || 'Processing...';

  // Only re-render steps if not already rendered (avoids flicker on nav back)
  const container = document.getElementById('steps-container');
  if (!container.children.length) {
    renderSteps();
  }

  // Immediately reflect current progress (no flash of "pending")
  updateProgress();

  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(pollJob, 2000);
  pollJob();
}

function renderSteps() {
  const container = document.getElementById('steps-container');
  container.innerHTML = STEP_NAMES.map((name, i) => `
    <div class="step pending" id="step-${i}">
      <div class="step-icon">${i + 1}</div>
      <div class="step-body">
        <div class="step-title">${name}</div>
        <div class="step-bar"><div class="step-bar-fill" style="width:0%"></div></div>
        <div class="step-time"></div>
      </div>
    </div>
  `).join('');
}

async function pollJob() {
  try {
    const resp = await fetch('/api/jobs/current');
    const data = await resp.json();
    if (!data.job) return;
    currentJob = data.job;

    // Update title if it arrived
    const titleEl = document.getElementById('processing-title');
    if (currentJob.title && titleEl) titleEl.textContent = currentJob.title;

    if (currentJob.status === 'done') {
      clearInterval(pollInterval);
      pollInterval = null;
      updateProgress(); // final update to show all steps as done
      showInlinePlayer(currentJob.id);
      return;
    }
    if (currentJob.status === 'failed') {
      clearInterval(pollInterval);
      pollInterval = null;
      showError(currentJob.error || 'Unknown error');
      return;
    }

    updateProgress();
  } catch (e) {
    // Silently retry on next interval
  }
}

function updateProgress() {
  const job = currentJob;
  const now = Date.now();

  for (let i = 0; i < STEP_NAMES.length; i++) {
    const el = document.getElementById('step-' + i);
    const stepNum = i + 1;
    const barFill = el.querySelector('.step-bar-fill');
    const timeEl = el.querySelector('.step-time');

    el.className = 'step';
    if (stepNum < job.step || job.status === 'done') {
      el.classList.add('done');
      barFill.style.width = '100%';
      timeEl.textContent = 'Done';
    } else if (stepNum === job.step) {
      el.classList.add('active');
      const pct = Math.round((job.step_progress || 0) * 100);
      barFill.style.width = pct + '%';

      const stepStarted = new Date(job.step_started_at).getTime();
      const stepElapsed = (now - stepStarted) / 1000;
      const stepEst = job.step_estimates ? job.step_estimates[i] : null;

      let timeText = formatDuration(stepElapsed);
      if (stepEst && stepEst > 1) {
        timeText += ' / ~' + formatDuration(stepEst) + ' est.';
      }
      timeEl.textContent = timeText;
    } else {
      el.classList.add('pending');
      barFill.style.width = '0%';
      if (job.step_estimates && job.step_estimates[i] > 1) {
        timeEl.textContent = '~' + formatDuration(job.step_estimates[i]) + ' est.';
      } else {
        timeEl.textContent = '';
      }
    }
  }

  // Overall progress bar
  let overallPct = 0;
  let remainingEst = 0;
  const etaEl = document.getElementById('overall-eta');

  if (job.status === 'done') {
    overallPct = 100;
    etaEl.textContent = 'Complete';
  } else if (job.step_estimates && job.estimated_total > 0) {
    let completedTime = 0;
    for (let i = 0; i < job.step - 1; i++) {
      completedTime += job.step_estimates[i];
    }
    const currentStepEst = job.step_estimates[job.step - 1] || 0;
    completedTime += currentStepEst * (job.step_progress || 0);
    overallPct = Math.min((completedTime / job.estimated_total) * 100, 99);
    remainingEst = job.estimated_total - completedTime;
    if (remainingEst > 5) {
      etaEl.textContent = '~' + formatDuration(remainingEst) + ' remaining';
    } else {
      etaEl.textContent = 'Almost done...';
    }
  } else {
    overallPct = ((job.step - 1) / 5) * 100;
    etaEl.textContent = 'Estimating...';
  }

  document.getElementById('overall-fill').style.width = overallPct + '%';

  // Update output files panel
  renderOutputFiles(job);
}

const HIDDEN_FILES = new Set(['wav', 'ass']);

function renderOutputFiles(job) {
  const container = document.getElementById('output-files');
  if (!job.artifacts || Object.keys(job.artifacts).length === 0) {
    container.innerHTML = '<p class="output-placeholder">Files will appear here as each step completes.</p>';
    return;
  }

  const files = [];
  let hasLyrics = false;
  for (const [step, arts] of Object.entries(job.artifacts)) {
    for (const a of arts) {
      const ext = a.name.split('.').pop().toLowerCase();
      if (HIDDEN_FILES.has(ext)) continue;
      if (a.name === 'lyrics.json') { hasLyrics = true; continue; }
      files.push({ ...a, step: parseInt(step), ext });
    }
  }

  if (files.length === 0 && !hasLyrics) {
    container.innerHTML = '<p class="output-placeholder">Files will appear here as each step completes.</p>';
    return;
  }

  let html = files.map(f => `
    <a class="output-file" href="/api/jobs/${job.id}/artifact/${f.path}" title="Download ${f.name}">
      <div class="output-file-icon">${f.ext}</div>
      <span class="output-file-name">${f.name}</span>
      <span class="output-file-step">Step ${f.step}</span>
    </a>
  `).join('');

  if (hasLyrics) {
    html += `
      <a class="output-file" href="#" onclick="showLyricsPopup('${job.id}'); return false;" title="View lyrics">
        <div class="output-file-icon" style="background:#3a2e20; color:#e8d5a3;">Aa</div>
        <span class="output-file-name">Lyrics</span>
        <span class="output-file-step">Step 3</span>
      </a>
    `;
  }

  container.innerHTML = html;
}

async function showLyricsPopup(jobId) {
  const overlay = document.getElementById('lyrics-overlay');
  const body = document.getElementById('lyrics-popup-body');
  body.innerHTML = '<p style="color:#8a7e6b;">Loading...</p>';
  overlay.classList.remove('hidden');

  try {
    const resp = await fetch(`/api/jobs/${jobId}/lyrics`);
    const words = await resp.json();
    if (!words || words.length === 0) {
      body.innerHTML = '<p style="color:#8a7e6b;">No lyrics found.</p>';
      return;
    }
    // Group into lines of ~8 words
    const lines = [];
    for (let i = 0; i < words.length; i += 8) {
      lines.push(words.slice(i, i + 8).map(w => w.text).join(' '));
    }
    body.innerHTML = lines.map(l => `<p class="lyrics-popup-line">${escapeHtml(l)}</p>`).join('');
  } catch (e) {
    body.innerHTML = '<p style="color:#e07050;">Failed to load lyrics.</p>';
  }
}

function closeLyricsPopup() {
  document.getElementById('lyrics-overlay').classList.add('hidden');
}

function parseSRT(text) {
  const cues = [];
  const blocks = text.trim().split(/\n\n+/);
  for (const block of blocks) {
    const lines = block.split('\n');
    if (lines.length < 3) continue;
    const timeMatch = lines[1].match(/(\d{2}):(\d{2}):(\d{2}),(\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2}),(\d{3})/);
    if (!timeMatch) continue;
    const start = +timeMatch[1]*3600 + +timeMatch[2]*60 + +timeMatch[3] + +timeMatch[4]/1000;
    const end = +timeMatch[5]*3600 + +timeMatch[6]*60 + +timeMatch[7] + +timeMatch[8]/1000;
    const text = lines.slice(2).join('\n');
    cues.push({ start, end, text });
  }
  return cues;
}

function extractVideoId(url) {
  const m = url.match(/(?:v=|youtu\.be\/|\/embed\/|\/v\/|\/shorts\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

function destroyYtPlayer() {
  if (subtitleAnimFrame) {
    cancelAnimationFrame(subtitleAnimFrame);
    subtitleAnimFrame = null;

  if (ytPlayer && ytPlayer.destroy) {

    ytPlayer = null;

  subtitleCues = [];
}

          </button>` : ''}
        </div>
      </div>`;

  // Load first language SRT
  if (languages.length > 0) {
    switchSubtitleLang(languages[0], true);
  }

  // Create YouTube player — disable native fullscreen (fs:0) so we control it
  function createPlayer() {
    ytPlayer = new YT.Player('yt-player-target', {
      videoId: videoId,
      playerVars: { autoplay: 0, modestbranding: 1, rel: 0, fs: 0 },
      events: {
        onReady: () => { startSubtitleSync(); },

    });

  if (window.YT && window.YT.Player) {
    createPlayer();
  } else {
    window._pendingYtCreate = createPlayer;
  }
}

function startSubtitleSync() {
  const overlay = document.getElementById('subtitle-overlay');
  if (!overlay) return;

  let lastText = '';
  function tick() {
    subtitleAnimFrame = requestAnimationFrame(tick);
    if (!ytPlayer || !ytPlayer.getCurrentTime) return;

    const t = ytPlayer.getCurrentTime() + SUBTITLE_OFFSET;

    // Subtitle overlay sync
    if (subtitlesVisible) {
      let activeText = '';
      for (const cue of subtitleCues) {
        if (t >= cue.start && t <= cue.end) {
          activeText = cue.text;
          break;
        }
      }
      if (activeText !== lastText) {
        overlay.textContent = activeText;
        lastText = activeText;
      }
    }

    // Live Lyrics sync (reuse same time source)
    updateLyricsHighlight(t);
  }
  tick();
}

function formatDuration(secs) {
  secs = Math.round(secs);
  if (secs < 60) return secs + 's';
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  if (m < 60) return m + 'm ' + (s > 0 ? s + 's' : '');
  const h = Math.floor(m / 60);
  return h + 'h ' + (m % 60) + 'm';
}

async function resumeJob() {
  if (!currentJob || !currentJob.id) return;

  const btn = document.getElementById('btn-resume');
  btn.disabled = true;
  btn.textContent = 'Resuming...';

  try {
    const resp = await fetch(`/api/jobs/${currentJob.id}/resume`, { method: 'POST' });
    if (resp.status === 409) {
      showAlert('A job is already running.');
      return;
    }
    if (!resp.ok) {
      const data = await resp.json().catch(() => ({}));
      throw new Error(data.detail || 'Failed to resume');
    }
    const data = await resp.json();
    currentJob = data.job;
    showProcessing();
  } catch (e) {
    showAlert('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Resume';
  }
}

async function showPlayerForJob(jobId) {
  playerMode = 'overlay';

  // Always resolve from library item (has LLM-enriched metadata).
  // Only fall back to /api/jobs/current if item isn't in the library yet.
  let item = libraryItems.find(i => i.id === jobId);
  if (!item) {
    // Item not cached — re-fetch library
    try {
      const libResp = await fetch('/api/library');
      const libData = await libResp.json();
      libraryItems = libData.items || [];
      _lastLibraryCount = libraryItems.length;
      item = libraryItems.find(i => i.id === jobId);
    } catch (e) {}
  }
  if (item) {
    _playerItem = { ...item, status: 'done' };
  } else {
    // Not in library — might be currently processing
    try {
      const resp = await fetch('/api/jobs/current');
      const data = await resp.json();
      if (data.job && data.job.id === jobId) {
        _playerItem = data.job;
      } else {
        _playerItem = { id: jobId, title: 'Unknown', status: 'done' };
      }
    } catch (e) {
      _playerItem = { id: jobId, title: 'Unknown', status: 'done' };
    }
  }

  // Record view and show the overlay
  fetch(`/api/jobs/${jobId}/view`, { method: 'POST' }).catch(() => {});
  document.getElementById('player-overlay').classList.remove('hidden');
  window.location.hash = `/watch/${jobId}`;

  const jobMode = _playerItem.mode || 'karaoke';

  // Load comments for this song
  loadComments(jobId);

  if (jobMode === 'subtitled') {
    _tabsEl().innerHTML = '';
    try {
      const resp = await fetch(`/api/jobs/${jobId}/lyrics`);
      lyricsData = await resp.json();
    } catch (e) { lyricsData = []; }
    const _subItem = libraryItems.find(i => i.id === jobId);
    const _subUrl = _subItem?.url || _playerItem?.url || '';
    const _subLangs = _subItem?.languages || _playerItem?.languages || [];
    renderSubtitledPlayer(jobId, _subUrl, _subLangs);
    renderLyrics();
    const lyricsTabs = document.getElementById('lyrics-tabs');
    if (lyricsTabs) {
      lyricsTabs.style.display = (lyricsData && lyricsData.length > 0) ? 'flex' : 'none';
      switchLyricsTab('live');
    }
    setTimeout(_syncPlayerHeight, 100);
    return;
  }

  try {
    const resp = await fetch(`/api/jobs/${jobId}/lyrics`);
    lyricsData = await resp.json();
  } catch (e) {
    lyricsData = [];
  }

  renderTabs(jobId);
  switchTab('video', jobId);
}

async function saveEditMetadata(jobId) {
  const title = document.getElementById('meta-edit-title').value.trim();
  const artist = document.getElementById('meta-edit-artist').value.trim();
  const year = document.getElementById('meta-edit-year').value.trim();
  if (!title) { showAlert('Title is required.'); return; }

  try {
    const resp = await fetch('/api/jobs/' + jobId, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, artist: artist || null, year: year || null }),
    });
    if (!resp.ok) throw new Error();
    const data = await resp.json();

    // Update in-memory data (library item is the source of truth)
    const item = libraryItems.find(i => i.id === jobId);
    if (item) {
      item.title = data.title;
      item.artist = data.artist;
      item.year = data.year;
    }
    if (_playerItem && _playerItem.id === jobId) {
      _playerItem.title = data.title;
      _playerItem.artist = data.artist;
      _playerItem.year = data.year;
    }

    // Update the title info in the player (re-render via helper)
    const infoEl = document.getElementById('player-title-info');
    if (infoEl) {
      const tmp = document.createElement('div');
      tmp.innerHTML = _renderPlayerTitleInfo(jobId);
      infoEl.replaceWith(tmp.firstElementChild);

    renderLibraryGrid();
    document.querySelector('.confirm-overlay')?.remove();

function flipPlayerMode(jobId) {
  const nextTab = _currentPlayerTab === 'video' ? 'subtitled' : 'video';
  const layout = document.querySelector('.player-overlay:not(.hidden) .player-layout');
  if (!layout) { switchTab(nextTab, jobId); return; }

  // Slide current view out to the left
  layout.style.transition = 'transform 0.3s ease-in, opacity 0.3s ease-in';
  layout.style.transform = 'translateX(-100%)';
  layout.style.opacity = '0';

  setTimeout(() => {
    // Swap content while off-screen
    switchTab(nextTab, jobId);

    // Position new content off-screen to the right
    layout.style.transition = 'none';
    layout.style.transform = 'translateX(100%)';
    layout.style.opacity = '0';

    // Slide new view in from the right
    requestAnimationFrame(() => {
      layout.style.transition = 'transform 0.3s ease-out, opacity 0.3s ease-out';
      layout.style.transform = 'translateX(0)';
      layout.style.opacity = '1';
    });

    // Clean up
    setTimeout(() => { layout.style.transition = ''; }, 350);
  }, 300);
}

let vocalsAudioEl = null;
let vocalsOn = false;
let _currentVideoJobId = null;

function switchTab(tab, jobId) {
  const id = jobId || (_playerItem ? _playerItem.id : '');

  _tabsEl().querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });

  const area = _playerAreaEl();

    activeMediaEl.removeEventListener('play', onMediaPlay);
    activeMediaEl.removeEventListener('pause', onMediaPause);
    activeMediaEl.removeEventListener('seeked', onMediaSeeked);
    activeMediaEl.removeEventListener('ended', _onPlayerEnded);
  }
  // Destroy vocals sync when leaving video tab
  if (tab !== 'video') destroyVocalsSync();

  const shareIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>`;
  const shareBtn = userCan('can_share_library') ? `<button class="player-share-btn" onclick="sharePlayer()" title="Copy link">${shareIcon}</button>` : '';

  const flipBtn = _isBothMode(id) ? `<button class="karaoke-fullscreen-btn-inline" onclick="flipPlayerMode('${id}')" title="${tab === 'video' ? 'Subtitled Mode' : 'Karaoke Mode'}" style="font-size:0.7rem;font-weight:700;font-family:inherit;letter-spacing:0.02em;">CC</button>` : '';

    area.innerHTML = `
      <div class="video-container" id="karaoke-video-container">
        <video id="media-el" controls preload="auto" src="/api/jobs/${id}/video" autoplay></video>
      </div>
      <div class="tab-download">
        <div class="tab-download-left">
          <div class="vocal-volume-control">

            <svg class="vocal-icon active" id="vocal-icon" onclick="toggleVocalsMute()" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" title="Toggle vocals">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
            <input type="range" id="vocal-volume-slider" class="vocal-volume-slider" min="0" max="100" value="100" oninput="setVocalsVolume(this.value)">
          </div>
          <button class="karaoke-fullscreen-btn-inline" onclick="toggleKaraokeFullscreen()" title="Fullscreen">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          </button>

        </div>
        ${_renderPlayerTitleInfo(id)}
        <div class="tab-download-right">
          <span class="vote-controls" data-vote-id="${id}">${renderVoteControls(id, _getVoteData(id, 'up'), _getVoteData(id, 'down'), _getVoteData(id, 'user'))}</span>
          ${shareBtn}
        </div>
      </div>`;
  } else if (tab === 'instrumental') {
    area.innerHTML = `
      <audio id="media-el" controls preload="metadata" src="/api/jobs/${id}/instrumental"></audio>`;
  } else if (tab === 'subtitled') {
    _currentPlayerTab = 'subtitled';
    // Subtitled tab for "both" mode — render YouTube player with subtitle overlay
    const _item = libraryItems.find(i => i.id === id);
    const langs = _item?.languages || _playerItem?.languages || [];
    const _url = _item?.url || _playerItem?.url || '';
    renderSubtitledPlayer(id, _url, langs);
    renderLyrics();
    const lyricsTabs = document.getElementById('lyrics-tabs');
    if (lyricsTabs) {
      lyricsTabs.style.display = (lyricsData && lyricsData.length > 0) ? 'flex' : 'none';
      switchLyricsTab('live');
    }
    setTimeout(_syncPlayerHeight, 100);
    return;

    area.innerHTML = `
      <audio id="media-el" controls preload="metadata" src="/api/jobs/${id}/vocals"></audio>`;
  }

  activeMediaEl = document.getElementById('media-el');
  activeMediaEl.addEventListener('timeupdate', onTimeUpdate);
  activeMediaEl.addEventListener('ended', _onPlayerEnded);
  activeMediaEl.addEventListener('play', onMediaPlay);
  activeMediaEl.addEventListener('pause', onMediaPause);
  activeMediaEl.addEventListener('seeked', onMediaSeeked);

  // Start lyrics RAF immediately if already playing (e.g. autoplay)
  if (!activeMediaEl.paused) _startLyricsRaf();

  // Pre-load vocals and auto-enable once video actually starts playing
  if (tab === 'video') {
    preloadVocalsAudio(id);
    // We can't call .play() on the vocals Audio until the user interacts.
    // The video element has autoplay, but that doesn't grant play permission
    // to a separate Audio object. So we hook into the video's first 'playing'
    // event — by that point the browser has granted audio context permission.
    const startVocalsOnce = () => {
      activeMediaEl.removeEventListener('playing', startVocalsOnce);
      if (vocalsAudioEl) {
        vocalsAudioEl.volume = _vocalsVolume;
        vocalsOn = true;
        _playVocals();
        _updateVocalIcon();
      }
    };
    activeMediaEl.addEventListener('playing', startVocalsOnce);
  }

  renderLyrics();

  // Show lyrics tabs if we have lyrics
  const lyricsTabs = document.getElementById('lyrics-tabs');
  if (lyricsTabs) {
    lyricsTabs.style.display = (lyricsData && lyricsData.length > 0) ? 'flex' : 'none';
    // Reset to Live Lyrics tab
    switchLyricsTab('live');
  }

  // Sync lyrics pane height to player
  setTimeout(_syncPlayerHeight, 100);
}

// --- Vocal toggle sync ---

function preloadVocalsAudio(jobId) {
  if (vocalsAudioEl && _currentVideoJobId === jobId) return;
  destroyVocalsSync();

  _currentVideoJobId = jobId;
  vocalsAudioEl = new Audio(`/api/jobs/${jobId}/vocals`);
  vocalsAudioEl.preload = 'auto';
  vocalsAudioEl.volume = 0;
  // Just preload — don't play until user interaction
}

let _vocalsVolume = 1.0; // last non-zero volume (for unmute restore)

function toggleVocals(on) {
  vocalsOn = on;
  if (!vocalsAudioEl || !activeMediaEl) return;

  if (on && !activeMediaEl.paused) {
    vocalsAudioEl.volume = _vocalsVolume;
    _playVocals();
  } else {
    vocalsAudioEl.pause();
    if (!on) vocalsAudioEl.volume = 0;
  }
  _updateVocalIcon();
}

function setVocalsVolume(val) {
  const v = parseInt(val) / 100;
  const slider = document.getElementById('vocal-volume-slider');
  if (slider) slider.style.setProperty('--vol-pct', val + '%');
  if (v > 0) _vocalsVolume = v;
  if (vocalsAudioEl) vocalsAudioEl.volume = v;
  const wasOn = vocalsOn;
  vocalsOn = v > 0;
  if (vocalsOn && !wasOn && activeMediaEl && !activeMediaEl.paused) {
    _playVocals();
  } else if (!vocalsOn && wasOn && vocalsAudioEl) {
    vocalsAudioEl.pause();
  }
  _updateVocalIcon();
}

function toggleVocalsMute() {
  if (vocalsOn) {
    setVocalsVolume(0);
    const slider = document.getElementById('vocal-volume-slider');
    if (slider) slider.value = 0;
  } else {
    const restore = Math.round(_vocalsVolume * 100);
    setVocalsVolume(restore);
    const slider = document.getElementById('vocal-volume-slider');
    if (slider) slider.value = restore;
  }
}

function _updateVocalIcon() {
  const icon = document.getElementById('vocal-icon');
  if (icon) {
    icon.classList.toggle('active', vocalsOn);
  }
}

function destroyVocalsSync() {
  if (vocalsAudioEl) {
    vocalsAudioEl.pause();
    vocalsAudioEl.src = '';
    vocalsAudioEl = null;
  }
  vocalsOn = false;
  _currentVideoJobId = null;
}

function _playVocals() {
  if (!vocalsAudioEl || !vocalsOn || !activeMediaEl) return;
  vocalsAudioEl.volume = 1;
  vocalsAudioEl.currentTime = activeMediaEl.currentTime + VOCALS_OFFSET;
  vocalsAudioEl.play().then(() => {
    if (activeMediaEl && activeMediaEl.paused) vocalsAudioEl.pause();
  }).catch(() => {});
}

function onMediaPlay() {
  if (vocalsAudioEl && vocalsOn) _playVocals();
  _startLyricsRaf();
}

function onMediaPause() {
  if (vocalsAudioEl) {
    vocalsAudioEl.pause();
    vocalsAudioEl.removeAttribute('autoplay');
  }
  _stopLyricsRaf();
  // One final update at the paused position
  if (activeMediaEl) updateLyricsHighlight(activeMediaEl.currentTime);
}

// Failsafe: periodically check if vocals are out of sync with video pause state
setInterval(() => {
  if (!vocalsAudioEl || !activeMediaEl || !vocalsOn) return;
  if (activeMediaEl.paused && !vocalsAudioEl.paused) {
    vocalsAudioEl.pause();
  }
}, 500);

function onMediaSeeked() {
  if (vocalsAudioEl && vocalsOn && !activeMediaEl.paused) {
    _playVocals();
  }
  // Immediately update highlight at seek position
  if (activeMediaEl) updateLyricsHighlight(activeMediaEl.currentTime);
}

// ---- Synced Lyrics ----

const LINE_GAP_THRESHOLD = 0.3; // seconds — gap between words that triggers a new line
const MAX_WORDS_PER_LINE = 10;  // hard limit to prevent overly long lines
let lyricsLines = [];
let currentLineIdx = -1;
let _lyricsScrollEl = null;

function _groupWordsIntoLines(words) {
  // Group words into lines based on timing gaps between consecutive words
  const lines = [];
  let currentLine = [];

  for (let i = 0; i < words.length; i++) {
    currentLine.push(words[i]);

    const isLast = i === words.length - 1;
    const gap = !isLast ? words[i + 1].start - words[i].end : 0;
    const atMaxLength = currentLine.length >= MAX_WORDS_PER_LINE;

    if (isLast || gap >= LINE_GAP_THRESHOLD || atMaxLength) {
      lines.push([...currentLine]);
      currentLine = [];
    }
  }
  return lines;
}

function renderLyrics() {
  const panel = _lyricsPanelEl();
  panel.innerHTML = '';
  lyricsLines = [];
  currentLineIdx = -1;
  _lyricsScrollEl = null;

  if (!lyricsData || lyricsData.length === 0) {
    panel.innerHTML = '<p style="color:#666">No lyrics available</p>';
    return;
  }

  // Create scroll container
  const scrollInner = document.createElement('div');
  scrollInner.className = 'lyrics-scroll-inner';
  _lyricsScrollEl = scrollInner;

  const grouped = _groupWordsIntoLines(lyricsData);

  for (const chunk of grouped) {
    const lineEl = document.createElement('div');
    lineEl.className = 'lyrics-line';

    const lineData = { words: [], el: lineEl };

    chunk.forEach(w => {
      const span = document.createElement('span');
      span.className = 'lyrics-word';
      span.textContent = w.text + ' ';
      lineEl.appendChild(span);
      lineData.words.push({ ...w, el: span });
    });

    scrollInner.appendChild(lineEl);
    lyricsLines.push(lineData);
  }

  panel.appendChild(scrollInner);
}

const VOCALS_OFFSET = 0.0; // seconds — no offset needed when streaming from R2/CDN
const VOCALS_DRIFT_THRESHOLD = 0.15; // correct if drift exceeds 150ms
let _lastDriftCorrection = 0; // timestamp of last correction

function updateLyricsHighlight(t) {
  if (!lyricsLines.length) return;

  let activeLine = -1;

  for (let li = 0; li < lyricsLines.length; li++) {
    const line = lyricsLines[li];
    const lineStart = line.words[0].start;
    const lineEnd = line.words[line.words.length - 1].end;
    const isCurrentLine = t >= lineStart - 0.3 && t <= lineEnd + 0.5;

    if (isCurrentLine) activeLine = li;

    if (t > lineEnd + 0.5) {
      line.el.className = 'lyrics-line past';
    } else if (isCurrentLine) {
      line.el.className = 'lyrics-line active-line';
    } else {
      line.el.className = 'lyrics-line';
    }

    for (const w of line.words) {
      if (t >= w.start && t < w.end) {
        w.el.className = 'lyrics-word active';
      } else if (t >= w.end) {
        w.el.className = 'lyrics-word sung';
      } else {
        w.el.className = 'lyrics-word';
      }
    }
  }

  // Smooth scroll — translate the inner container so active line is centered
  if (activeLine >= 0 && activeLine !== currentLineIdx && _lyricsScrollEl) {
    currentLineIdx = activeLine;
    const panel = _lyricsPanelEl();
    const lineEl = lyricsLines[activeLine].el;
    const panelH = panel.clientHeight;
    const lineTop = lineEl.offsetTop;
    const lineH = lineEl.offsetHeight;
    // Position active line ~30% from the top (room for 3-4 sung lines above)
    const targetY = Math.min(0, -(lineTop - panelH * 0.3 + lineH / 2));
    _lyricsScrollEl.style.transform = `translateY(${targetY}px)`;
  }
}

let _lyricsRafId = null;

function _lyricsRafLoop() {
  if (!activeMediaEl) { _lyricsRafId = null; return; }
  updateLyricsHighlight(activeMediaEl.currentTime);
  _lyricsRafId = requestAnimationFrame(_lyricsRafLoop);
}

function _startLyricsRaf() {
  if (!_lyricsRafId) _lyricsRafId = requestAnimationFrame(_lyricsRafLoop);
}

function _stopLyricsRaf() {
  if (_lyricsRafId) { cancelAnimationFrame(_lyricsRafId); _lyricsRafId = null; }
}

function onTimeUpdate() {
  // Drift correction for vocal sync — check every 2s
  if (vocalsAudioEl && vocalsOn && !activeMediaEl.paused) {
    const now = performance.now();
    if (now - _lastDriftCorrection > 2000) {
      const expected = activeMediaEl.currentTime + VOCALS_OFFSET;
      const drift = vocalsAudioEl.currentTime - expected;
      if (Math.abs(drift) > VOCALS_DRIFT_THRESHOLD) {
        vocalsAudioEl.currentTime = expected;
      }
      _lastDriftCorrection = now;
    }
  }

  // Fallback lyrics update if RAF isn't running
  if (!_lyricsRafId && activeMediaEl) {
    updateLyricsHighlight(activeMediaEl.currentTime);
  }
  // Ensure RAF is running when media is playing
  if (activeMediaEl && !activeMediaEl.paused) _startLyricsRaf();
}

// ---- Library ----

let libraryItems = [];
let libraryFilters = { search: '', categories: new Set(), types: new Set(), sort: 'recent' };

async function loadLibrary() {
  const main = document.getElementById('library-main');
  main.innerHTML = '<p style="text-align:center; color:#8a7e6b;">Loading...</p>';

  try {
    const resp = await fetch('/api/library');
    const data = await resp.json();
    libraryItems = data.items || [];
    _lastLibraryCount = libraryItems.length;

    if (libraryItems.length === 0) {
      document.getElementById('library-filter-bar').innerHTML = '';
      main.innerHTML = `
        <div class="library-empty">
          <p>No songs yet.</p>
          <p style="margin-top:8px;">Generate your first video to see it here.</p>
        </div>
      `;
      return;
    }

    libraryFilters = { search: '', categories: new Set(), types: new Set(), sort: 'recent' };
    renderLibraryFilterBar();
    renderLibraryGrid();
  } catch (e) {
    main.innerHTML = '<p style="text-align:center; color:#e07050;">Failed to load jukebox</p>';
  }
}

function renderLibraryFilterBar() {
  const bar = document.getElementById('library-filter-bar');

  // Collect type facets — 'both' counts under both Karaoke and Subtitled
  const typeCounts = {};
  for (const item of libraryItems) {
    const m = item.mode || 'karaoke';
    if (m === 'both') {
      typeCounts['Karaoke'] = (typeCounts['Karaoke'] || 0) + 1;
      typeCounts['Subtitled'] = (typeCounts['Subtitled'] || 0) + 1;
    } else {
      const type = m === 'subtitled' ? 'Subtitled' : 'Karaoke';
      typeCounts[type] = (typeCounts[type] || 0) + 1;
    }
  }

  const types = Object.keys(typeCounts).sort();

  // Type tabs in header row
  const tabsEl = document.getElementById('library-header-tabs');
  const activeType = libraryFilters.types.size === 1 ? [...libraryFilters.types][0] : '';
  const libraryActive = activeType === '';
  const typeTabs = types.map(t => {
    const isActive = t === activeType;
    return `<span class="divider-pipe">|</span><button class="filter-tab ${isActive && !_wishlistActive ? 'active' : ''}" onclick="_wishlistActive=false; setFilterType('${t}'); renderLibraryFilterBar(); renderLibraryGrid()">${t.toUpperCase()}</button>`;
  }).join('');
  tabsEl.innerHTML = `
    <div class="library-tabs">
      <button class="filter-tab library-tab ${libraryActive && !_wishlistActive ? 'active' : ''}" onclick="_wishlistActive=false; setFilterType(''); renderLibraryFilterBar(); renderLibraryGrid()">JUKEBOX</button>
      ${types.length > 0 ? typeTabs : ''}
      ${appSettings.feature_wishlist ? `<span class="divider-pipe">|</span><button class="filter-tab ${_wishlistActive ? 'active' : ''}" onclick="showWishlistTab()">REQUESTS</button>` : ''}
    </div>`;

  if (_wishlistActive) {
    renderWishlistFilterBar();
    return;
  }

  // Sort dropdown + search
  const s = libraryFilters.sort;
  bar.innerHTML = `
    <input type="text" placeholder="Search..." value="${escapeHtml(libraryFilters.search)}"
           oninput="libraryFilters.search=this.value; renderLibraryGrid()" />
    <select onchange="libraryFilters.sort=this.value; renderLibraryGrid()">
      <option value="recent" ${s === 'recent' ? 'selected' : ''}>Most Recent</option>
      <option value="liked" ${s === 'liked' ? 'selected' : ''}>Most Liked</option>
      <option value="viewed" ${s === 'viewed' ? 'selected' : ''}>Most Viewed</option>
      <option value="az" ${s === 'az' ? 'selected' : ''}>A \u2013 Z</option>
      <option value="za" ${s === 'za' ? 'selected' : ''}>Z \u2013 A</option>
    </select>
  `;
}

function setFilterType(val) {
  libraryFilters.types = val ? new Set([val]) : new Set();
}


function toggleFilter(facet, value) {
  const set = libraryFilters[facet];
  if (set.has(value)) set.delete(value);
  else set.add(value);
  renderLibraryFilterBar();
  renderLibraryGrid();
}

function clearFilters() {
  libraryFilters = { search: '', categories: new Set(), types: new Set(), sort: 'recent' };
  renderLibraryFilterBar();
  renderLibraryGrid();
}

async function deleteJob(jobId) {
  if (!await showConfirm('Delete this song and all its files? This cannot be undone.')) return;
  try {
    const resp = await fetch(`/api/jobs/${jobId}`, { method: 'DELETE' });
    if (!resp.ok) {
      const data = await resp.json().catch(() => ({}));
      showAlert(data.detail || 'Failed to delete');
      return;
    }
    loadLibrary();
  } catch (e) {
    showAlert('Error: ' + e.message);
  }
}

function renderLibraryGrid() {
  const main = document.getElementById('library-main');
  const query = libraryFilters.search.toLowerCase();

  let filtered = libraryItems.filter(item => {
    // Text search
    if (query) {
      const haystack = [item.title, item.channel, ...(item.tags || [])].filter(Boolean).join(' ').toLowerCase();
      if (!haystack.includes(query)) return false;
    }
    // Category filter
    if (libraryFilters.categories.size > 0) {
      const cats = item.categories || [];
      if (!cats.some(c => libraryFilters.categories.has(c))) return false;
    }
    // Type filter — 'both' matches either Karaoke or Subtitled
    if (libraryFilters.types.size > 0) {
      const m = item.mode || 'karaoke';
      if (m === 'both') {
        if (!libraryFilters.types.has('Karaoke') && !libraryFilters.types.has('Subtitled')) return false;
      } else {
        const type = m === 'subtitled' ? 'Subtitled' : 'Karaoke';
        if (!libraryFilters.types.has(type)) return false;
      }
    }
    return true;
  });

  // Filter by active playlist
  const playlistJobIds = getPlaylistJobIds();
  if (playlistJobIds !== null) {
    filtered = filtered.filter(item => playlistJobIds.has(item.id));
  }

  // Sort
  const sortBy = libraryFilters.sort;
  if (sortBy === 'liked') {
    filtered.sort((a, b) => (b.upvotes || 0) - (a.upvotes || 0));
  } else if (sortBy === 'viewed') {
    filtered.sort((a, b) => (b.view_count || 0) - (a.view_count || 0));
  } else if (sortBy === 'az') {
    filtered.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
  } else if (sortBy === 'za') {
    filtered.sort((a, b) => (b.title || '').localeCompare(a.title || ''));
  }
  // 'recent' is the default order from the API (already sorted by finished_at desc)

  if (filtered.length === 0) {
    main.innerHTML = `
      <div class="library-results-count">${libraryItems.length} songs, 0 matching</div>
      <div class="library-empty"><p>${activePlaylistFilter !== null ? 'This playlist is empty.' : 'No songs match your filters.'}</p></div>
    `;
      return;
  }

  const count = '';
  const grid = filtered.map(item => {
    const duration = item.audio_duration ? formatDuration(item.audio_duration) : '';
    const channel = item.artist ? escapeHtml(item.artist) : (item.channel ? escapeHtml(item.channel) : '');
    const date = item.upload_date
      ? item.upload_date.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3')
      : '';
    const thumb = item.thumbnail
      ? `<img class="library-thumb" src="${item.thumbnail}" alt="" loading="lazy" />`
      : `<div class="library-thumb" style="display:flex;align-items:center;justify-content:center;color:#4a3f2f;font-size:2rem;">&#9835;</div>`;
    const mode = item.mode || 'karaoke';
    const badgeClass = mode === 'both' ? 'both' : (mode === 'subtitled' ? 'subtitled' : 'karaoke');
    const badgeText = mode === 'both' ? '<span style="color:#d4a84b">Karaoke</span> + Subtitles' : (mode === 'subtitled' ? 'Subtitles' : 'Karaoke');
    return `
      <div class="library-item" onclick="showPlayerForJob('${item.id}')">
        <div class="library-item-header">
          ${thumb}
          <span class="library-mode-badge ${badgeClass}">${badgeText}</span>
          ${userCan('can_delete_library') ? `<button class="library-delete-btn" onclick="event.stopPropagation(); deleteJob('${item.id}')" title="Delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>` : ''}
        </div>
        <div class="library-info">
          <h3>${escapeHtml(item.title || 'Unknown')}</h3>
          ${channel ? `<div class="channel">${channel}</div>` : ''}
          <div class="info-spacer"></div>
          <div class="meta-row">
            <span class="meta">${duration || ''} <span class="vote-controls-compact" data-vote-id="${item.id}">${renderVoteControlsCompact(item.id, item.upvotes, item.downvotes, item.user_vote)}</span>${item.comment_count > 0 ? `<span class="comment-count-badge" onclick="event.stopPropagation(); showPlayerForJob('${item.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> ${item.comment_count}</span>` : ''}</span>
            <div class="meta-actions">
              ${currentUser ? `<button class="library-playlist-btn" onclick="togglePlaylistDropdown('${item.id}', event)" title="Add to playlist">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>` : ''}
              ${userCan('can_share_library') ? `<button class="library-share-btn" onclick="event.stopPropagation(); shareLink('${item.id}')" title="Copy link">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              </button>` : ''}
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  main.innerHTML = count + '<div class="library-grid">' + grid + '</div>';
}

function showConfirm(message) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    overlay.innerHTML = `<div class="confirm-box">
      <p>${escapeHtml(message)}</p>
      <div class="confirm-btns">
        <button class="confirm-cancel">Cancel</button>
        <button class="confirm-ok">OK</button>
      </div>
    </div>`;
    overlay.querySelector('.confirm-cancel').onclick = () => { overlay.remove(); resolve(false); };
    overlay.querySelector('.confirm-ok').onclick = () => { overlay.remove(); resolve(true); };
    overlay.onclick = (e) => { if (e.target === overlay) { overlay.remove(); resolve(false); } };
    document.body.appendChild(overlay);
    overlay.querySelector('.confirm-ok').focus();
  });
}

function showAlert(message) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    overlay.innerHTML = `<div class="confirm-box">
      <p>${escapeHtml(message)}</p>
      <div class="confirm-btns">
        <button class="confirm-ok">Close</button>
      </div>
    </div>`;
    overlay.querySelector('.confirm-ok').onclick = () => { overlay.remove(); resolve(); };
    overlay.onclick = (e) => { if (e.target === overlay) { overlay.remove(); resolve(); } };
    document.body.appendChild(overlay);
    overlay.querySelector('.confirm-ok').focus();
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ---- Voting ----

async function voteOnJob(jobId, value) {
  if (!currentUser) { window.location.href = '/login'; return; }
  try {
    const resp = await fetch(`/api/jobs/${jobId}/vote`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ value }),
    });
    if (!resp.ok) return;
    const data = await resp.json();
    // Update the library item in memory
    const item = libraryItems.find(i => i.id === jobId);
    if (item) {
      item.upvotes = data.upvotes;
      item.downvotes = data.downvotes;
      item.user_vote = data.user_vote;
    }
    // Re-render vote controls everywhere this job appears
    document.querySelectorAll(`.vote-controls[data-vote-id="${jobId}"]`).forEach(el => {
      el.innerHTML = renderVoteControls(jobId, data.upvotes, data.downvotes, data.user_vote);
    });
    document.querySelectorAll(`.vote-controls-compact[data-vote-id="${jobId}"]`).forEach(el => {
      el.innerHTML = renderVoteControlsCompact(jobId, data.upvotes, data.downvotes, data.user_vote);
    });
  } catch (e) {}
}

function _getVoteData(jobId, type) {
  const item = (typeof libraryItems !== 'undefined' ? libraryItems : []).find(i => i.id === jobId);
  if (!item) return 0;
  if (type === 'up') return item.upvotes || 0;
  if (type === 'down') return item.downvotes || 0;
  if (type === 'user') return item.user_vote || 0;
  return 0;
}

function renderVoteControls(jobId, upvotes, downvotes, userVote) {
  const net = (upvotes || 0) - (downvotes || 0);
  return `
    <button class="vote-btn ${userVote === 1 ? 'upvoted' : ''}" onclick="event.stopPropagation(); voteOnJob('${jobId}', 1)">&#9650;</button>
    <span class="vote-count">${net}</span>
    <button class="vote-btn ${userVote === -1 ? 'downvoted' : ''}" onclick="event.stopPropagation(); voteOnJob('${jobId}', -1)">&#9660;</button>
  `;
}

function renderVoteControlsCompact(jobId, upvotes, downvotes, userVote) {
  return `
    <button class="vote-btn-sm ${userVote === 1 ? 'upvoted' : ''}" onclick="event.stopPropagation(); voteOnJob('${jobId}', 1)">&#9650;</button><span class="vote-count-sm">${upvotes || 0}</span>
    <button class="vote-btn-sm ${userVote === -1 ? 'downvoted' : ''}" onclick="event.stopPropagation(); voteOnJob('${jobId}', -1)">&#9660;</button><span class="vote-count-sm">${downvotes || 0}</span>
  `;
}

function shareLink(jobId) {
  const url = window.location.origin + '/#/watch/' + jobId;
  // Remove any existing share popup
  const existing = document.getElementById('share-popup-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'share-popup-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:1000;';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  overlay.innerHTML = `
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:500px;width:90%;position:relative;">
      <div class="player-overlay-actions"><button class="player-overlay-close" onclick="document.getElementById('share-popup-overlay').remove()">&times;</button></div>
      <h4 style="color:var(--text-bright);margin-bottom:14px;font-size:0.95rem;">Share Link</h4>
      <div style="display:flex;gap:8px;">
        <input type="text" id="share-url-input" value="${url}" readonly onclick="this.select()"
               style="flex:1;height:32px;padding:0 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-input);color:var(--text-bright);font-size:0.8rem;font-family:inherit;" />
        <button id="share-copy-btn" onclick="copyShareLink()" class="btn-primary" style="height:32px;padding:0 20px;white-space:nowrap;">Copy</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);
  document.getElementById('share-url-input').select();
}

function copyShareLink() {
  const input = document.getElementById('share-url-input');
  const btn = document.getElementById('share-copy-btn');
  navigator.clipboard.writeText(input.value).then(() => {
    btn.textContent = 'Copied!';
    btn.style.opacity = '0.7';
    setTimeout(() => {
      const overlay = document.getElementById('share-popup-overlay');
      if (overlay) overlay.remove();
    }, 800);
  }).catch(() => {
    input.select();
    document.execCommand('copy');
    btn.textContent = 'Copied!';
    setTimeout(() => {
      const overlay = document.getElementById('share-popup-overlay');
      if (overlay) overlay.remove();
    }, 800);
  });
}

function sharePlayer() {
  shareLink(_playerItem ? _playerItem.id : '');
}

let currentUser = null;
let appSettings = { allowed_modes: ['karaoke', 'subtitled', 'both'], feature_translation: true, feature_analysis: true, feature_wishlist: true };
let wishlistItems = [];
let wishlistFilters = { search: '', sort: 'votes' };
let _wishlistActive = false;

function userCan(perm) {
  if (!currentUser) return false;
  if (currentUser.role === 'admin') return true;
  if (!currentUser.permissions) return true;
  return currentUser.permissions[perm] !== false;
}

function applyAppSettings() {
  // Hide/show mode checkboxes based on allowed_modes
  const modes = appSettings.allowed_modes || [];
  const karaokeLabel = document.getElementById('mode-karaoke')?.closest('label');
  const subtitledLabel = document.getElementById('mode-subtitled')?.closest('label');
  if (karaokeLabel) karaokeLabel.style.display = modes.includes('karaoke') || modes.includes('both') ? '' : 'none';
  if (subtitledLabel) subtitledLabel.style.display = modes.includes('subtitled') || modes.includes('both') ? '' : 'none';

  // If current mode selection is no longer allowed, reset
  const k = document.getElementById('mode-karaoke');
  const s = document.getElementById('mode-subtitled');
  if (k && !modes.includes('karaoke') && !modes.includes('both')) k.checked = false;
  if (s && !modes.includes('subtitled') && !modes.includes('both')) s.checked = false;
  // Ensure at least one mode is selected
  if (k && s && !k.checked && !s.checked) {
    if (modes.includes('karaoke') || modes.includes('both')) k.checked = true;
    else if (modes.includes('subtitled')) s.checked = true;
  }
  if (typeof onModeChange === 'function') onModeChange();

async function saveProfile(e) {
  e.preventDefault();
  const btn = document.getElementById('profile-save-btn');
  const msg = document.getElementById('profile-message');
  btn.disabled = true;
  btn.textContent = 'Saving...';
  msg.style.display = 'none';

  const body = {};
  const name = document.getElementById('profile-name').value.trim();
  const email = document.getElementById('profile-email').value.trim();
  const currentPw = document.getElementById('profile-current-pw').value;
  const newPw = document.getElementById('profile-new-pw').value;

  if (name && name !== currentUser.name) body.name = name;
  if (email && email !== currentUser.email) body.email = email;
  if (newPw) {
    body.new_password = newPw;
    body.current_password = currentPw;
  }

  if (Object.keys(body).length === 0) {
    btn.disabled = false;
    btn.textContent = 'Save Changes';
    msg.textContent = 'No changes to save.';
    msg.style.color = 'var(--text-muted)';
    msg.style.display = 'block';
    return;
  }

  try {
    const resp = await fetch('/api/auth/profile', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    if (!resp.ok) {
      msg.textContent = data.detail || 'Failed to update profile.';
      msg.style.color = 'var(--error)';
      msg.style.display = 'block';
      return;
    }
    currentUser = { ...currentUser, ...data.user };
    renderUserMenu();
    renderProfileInfo();
    msg.textContent = 'Profile updated!';
    msg.style.color = 'var(--success)';
    msg.style.display = 'block';
  } catch (err) {
    msg.textContent = 'Failed to update profile.';
    msg.style.color = 'var(--error)';
    msg.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save Changes';
  }
}

async function submitFeedback(e) {
  e.preventDefault();
  const formData = new FormData();
  const subject = document.getElementById('feedback-subject').value;
  if (!subject) { showAlert('Please select a type.'); return; }
  formData.append('subject', subject);
  formData.append('description', document.getElementById('feedback-desc').value);
  const file = document.getElementById('feedback-file').files[0];
  if (file) {
    if (file.size > 5 * 1024 * 1024) { showAlert('Screenshot must be under 5MB.'); return; }
    formData.append('screenshot', file);
  }
  try {
    const resp = await fetch('/api/feedback', { method: 'POST', body: formData });
    if (!resp.ok) throw new Error('Failed');
    // Show confirmation in the same card
    const form = document.getElementById('feedback-form');
    form.innerHTML = `
      <div style="text-align:center;padding:20px 0;">
        <div style="font-size:2rem;margin-bottom:12px;">&#10003;</div>
        <p style="color:var(--text-bright);font-size:1rem;margin-bottom:8px;">Thank you!</p>
        <p style="color:var(--text-dim);font-size:0.85rem;">Your feedback has been submitted.</p>
        <button class="btn-primary" style="margin-top:16px;width:auto;padding:8px 24px;" onclick="closeFeedback()">Close</button>
      </div>
    `;
  } catch (err) { showAlert('Failed to submit feedback.'); }
}
