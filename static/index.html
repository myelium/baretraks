function shareLink(jobId) {
  const url = window.location.origin + '/#/watch/' + jobId;
  // Remove any existing share popup
  const existing = document.getElementById('share-popup-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'share-popup-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:1000;';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  overlay.innerHTML = `
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:500px;width:90%;position:relative;">
      <div class="player-overlay-actions"><button class="player-overlay-close" onclick="document.getElementById('share-popup-overlay').remove()">&times;</button></div>
      <h4 style="color:var(--text-bright);margin-bottom:14px;font-size:0.95rem;">Share Link</h4>
      <div style="display:flex;gap:8px;">
        <input type="text" id="share-url-input" value="${url}" readonly onclick="this.select()"
               style="flex:1;height:32px;padding:0 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-input);color:var(--text-bright);font-size:0.8rem;font-family:inherit;" />
        <button id="share-copy-btn" onclick="copyShareLink()" class="btn-primary" style="height:32px;padding:0 20px;white-space:nowrap;">Copy</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);
  document.getElementById('share-url-input').select();
}

function copyShareLink() {
  const input = document.getElementById('share-url-input');
  const btn = document.getElementById('share-copy-btn');
  navigator.clipboard.writeText(input.value).then(() => {
    btn.textContent = 'Copied!';
    btn.style.opacity = '0.7';
    setTimeout(() => {
      const overlay = document.getElementById('share-popup-overlay');
      if (overlay) overlay.remove();
    }, 800);
  }).catch(() => {
    input.select();
    document.execCommand('copy');
    btn.textContent = 'Copied!';
    setTimeout(() => {
      const overlay = document.getElementById('share-popup-overlay');
      if (overlay) overlay.remove();
    }, 800);
  });
}

function sharePlayer() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('btn-share');
    const orig = btn.innerHTML;
    btn.innerHTML = '<span style="font-size:0.8rem;color:#6b8f5e;">Copied!</span>';
    setTimeout(() => { btn.innerHTML = orig; }, 1500);
  }).catch(() => {
    prompt('Copy this link:', url);
  });
}

let currentUser = null;


function renderUserMenu() {
  const container = document.getElementById('header-actions');
  if (!currentUser) { container.innerHTML = ''; return; }

  const initials = (currentUser.name || currentUser.email || '?')
    .split(/[\s@]/).filter(Boolean).slice(0, 2).map(s => s[0].toUpperCase()).join('');

  const avatar = currentUser.picture_url
    ? `<img src="${currentUser.picture_url}" alt="" />`
    : initials;

  const modeIcons = { dark: '&#9789;', day: '&#9788;', night: '&#9733;' };
  const modeIcon = modeIcons[currentUser.dark_mode] || modeIcons.dark;

  container.innerHTML = `
    <button class="darkmode-toggle" onclick="cycleDarkMode()" title="Toggle dark mode">${modeIcon}</button>
    <div class="user-menu" id="user-menu">
      <div class="user-avatar" onclick="toggleUserMenu()">${avatar}</div>
      <div class="user-dropdown" id="user-dropdown">
        <div class="user-dropdown-header">${escapeHtml(currentUser.name || currentUser.email)}</div>
        <div class="user-dropdown-divider"></div>
        <button class="user-dropdown-item" onclick="openSettings()">Settings</button>
        ${currentUser.role === 'admin' ? '<button class="user-dropdown-item" onclick="openAdminPanel()">Admin Panel</button>' : ''}
        <div class="user-dropdown-divider"></div>
        <button class="user-dropdown-item" onclick="logout()">Sign Out</button>
      </div>
    </div>
  `;

  // Apply current theme/mode
  document.body.setAttribute('data-theme', currentUser.theme || 'retro');
  document.body.setAttribute('data-mode', currentUser.dark_mode || 'dark');
}

function toggleUserMenu() {
  const dd = document.getElementById('user-dropdown');
  dd.classList.toggle('open');
}

// Close dropdown when clicking outside
document.addEventListener('click', (e) => {
  const menu = document.getElementById('user-menu');
  const dd = document.getElementById('user-dropdown');
  if (menu && dd && !menu.contains(e.target)) dd.classList.remove('open');
});

async function cycleDarkMode() {
  const modes = ['dark', 'day', 'night'];
  const current = currentUser.dark_mode || 'dark';
  const next = modes[(modes.indexOf(current) + 1) % modes.length];
  currentUser.dark_mode = next;
  document.body.setAttribute('data-mode', next);
  renderUserMenu();
  await fetch('/api/auth/settings', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ dark_mode: next }),
  });
}

async function setTheme(theme) {
  currentUser.theme = theme;
  document.body.setAttribute('data-theme', theme);
  renderUserMenu();
  await fetch('/api/auth/settings', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ theme }),
  });
}

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login';
}

function openSettings() {
  document.getElementById('settings-overlay').classList.remove('hidden');
  document.getElementById('user-dropdown').classList.remove('open');
  renderSettingsButtons();
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.add('hidden');
}

function renderSettingsButtons() {
  const themes = [
    { id: 'retro', label: 'Retro', desc: 'Warm browns & gold' },
    { id: 'spotify', label: 'Spotify', desc: 'Dark with green' },
    { id: 'disco', label: 'Disco', desc: 'Neon purple & pink' },
  ];
  const modes = [
    { id: 'dark', label: 'Dark', icon: '&#9789;' },
    { id: 'day', label: 'Day', icon: '&#9788;' },
    { id: 'night', label: 'Night', icon: '&#9733;' },
  ];

  document.getElementById('settings-theme-btns').innerHTML = themes.map(t =>
    `<button onclick="setTheme('${t.id}'); renderSettingsButtons();" style="flex:1;height:auto;padding:12px 8px;border-radius:10px;border:2px solid ${currentUser.theme===t.id?'var(--accent)':'var(--border)'};background:var(--bg-input);color:var(--text-bright);cursor:pointer;font-family:inherit;transition:border-color 0.2s;text-align:center;">
      <div style="font-weight:600;font-size:0.85rem;">${t.label}</div>
      <div style="font-size:0.65rem;color:var(--text-dim);margin-top:4px;">${t.desc}</div>
    </button>`
  ).join('');

  document.getElementById('settings-mode-btns').innerHTML = modes.map(m =>
    `<button onclick="cycleDarkModeTo('${m.id}'); renderSettingsButtons();" style="flex:1;height:auto;padding:12px 8px;border-radius:10px;border:2px solid ${currentUser.dark_mode===m.id?'var(--accent)':'var(--border)'};background:var(--bg-input);color:var(--text-bright);cursor:pointer;font-family:inherit;transition:border-color 0.2s;text-align:center;">
      <div style="font-size:1.1rem;line-height:1;">${m.icon}</div>
      <div style="font-size:0.75rem;margin-top:6px;">${m.label}</div>
    </button>`
  ).join('');
}

async function cycleDarkModeTo(mode) {
  currentUser.dark_mode = mode;
  document.body.setAttribute('data-mode', mode);
  renderUserMenu();
  await fetch('/api/auth/settings', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ dark_mode: mode }),
  });
}

let _feedbackFormHTML = '';
function openFeedbackForm() {
  // Restore form if it was replaced by confirmation
  if (_feedbackFormHTML) {
    document.getElementById('feedback-form').innerHTML = _feedbackFormHTML;
  } else {
    _feedbackFormHTML = document.getElementById('feedback-form').innerHTML;
  }
  document.getElementById('feedback-overlay').classList.remove('hidden');
}
function closeFeedback() {
  document.getElementById('feedback-overlay').classList.add('hidden');
}
function selectFeedbackType(btn, value) {
  document.getElementById('feedback-subject').value = value;
  document.querySelectorAll('.feedback-type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

async function submitFeedback(e) {
  e.preventDefault();
  const formData = new FormData();
  const subject = document.getElementById('feedback-subject').value;
  if (!subject) { alert('Please select a type.'); return; }
  formData.append('subject', subject);
  formData.append('description', document.getElementById('feedback-desc').value);
  const file = document.getElementById('feedback-file').files[0];
  if (file) {
    if (file.size > 5 * 1024 * 1024) { alert('Screenshot must be under 5MB.'); return; }
    formData.append('screenshot', file);
  }
  try {
    const resp = await fetch('/api/feedback', { method: 'POST', body: formData });
    if (!resp.ok) throw new Error('Failed');
    // Show confirmation in the same card
    const form = document.getElementById('feedback-form');
    form.innerHTML = `
      <div style="text-align:center;padding:20px 0;">
        <div style="font-size:2rem;margin-bottom:12px;">&#10003;</div>
        <p style="color:var(--text-bright);font-size:1rem;margin-bottom:8px;">Thank you!</p>
        <p style="color:var(--text-dim);font-size:0.85rem;">Your feedback has been submitted.</p>
        <button class="btn-primary" style="margin-top:16px;width:auto;padding:8px 24px;" onclick="closeFeedback()">Close</button>
      </div>
    `;
  } catch (err) { alert('Failed to submit feedback.'); }
}

async function openAdminPanel() {
  document.getElementById('admin-overlay').classList.remove('hidden');
  await loadAdminUsers();
  await loadAdminFeedback();
}

function closeAdmin() {
  document.getElementById('admin-overlay').classList.add('hidden');
}

async function loadAdminUsers() {
  const container = document.getElementById('admin-users');
  try {
    const resp = await fetch('/api/admin/users');
    const data = await resp.json();
    container.innerHTML = data.users.map(u => `
      <div style="display:flex;align-items:center;gap:12px;padding:10px;border-bottom:1px solid var(--border-light);font-size:0.85rem;">
        <div style="flex:1;">
          <strong style="color:var(--text-bright);">${escapeHtml(u.name)}</strong>
          <span style="color:var(--text-dim);margin-left:8px;">${escapeHtml(u.email)}</span>
        </div>
        <span style="color:${u.role==='admin'?'var(--accent)':'var(--text-dim)'};font-size:0.75rem;font-weight:600;text-transform:uppercase;">${u.role}</span>
      </div>
    `).join('') || '<p style="color:var(--text-dim);padding:16px;">No users.</p>';
  } catch (e) { container.innerHTML = '<p style="color:var(--error);">Failed to load users.</p>'; }
}

async function loadAdminFeedback() {
  const container = document.getElementById('admin-feedback');
  try {
    const resp = await fetch('/api/admin/feedback');
    const data = await resp.json();
    container.innerHTML = data.feedback.map(fb => `
      <div style="padding:10px;border-bottom:1px solid var(--border-light);font-size:0.85rem;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <strong style="color:var(--text-bright);">${escapeHtml(fb.subject)}</strong>
          <span style="font-size:0.7rem;color:${fb.status==='new'?'var(--accent)':'var(--text-dim)'};text-transform:uppercase;">${fb.status}</span>
        </div>
        <p style="color:var(--text);margin:4px 0;">${escapeHtml(fb.description).substring(0, 200)}</p>
        <span style="font-size:0.7rem;color:var(--text-muted);">${fb.user_name || fb.user_email || ''} &mdash; ${fb.created_at ? new Date(fb.created_at).toLocaleDateString() : ''}</span>
      </div>
    `).join('') || '<p style="color:var(--text-dim);padding:16px;">No feedback yet.</p>';
  } catch (e) { container.innerHTML = '<p style="color:var(--error);">Failed to load feedback.</p>'; }
}

async function init() {
  // Check for shared watch link — allow without login
  const isSharedLink = window.location.hash.match(/^#\/watch\/(.+)$/);

  // Load current user (optional for shared links)
  try {
    const authResp = await fetch('/api/auth/me');
    if (authResp.ok) {
      const authData = await authResp.json();
      currentUser = authData.user;
      renderUserMenu();
    } else if (!isSharedLink) {
      window.location.href = '/login';
      return;
    }
  } catch (e) {
    if (!isSharedLink) { window.location.href = '/login'; return; }
  }

  // Load both panes on startup (only if authenticated)
  if (currentUser) loadLibrary();

  // Load queue state
  try {
    const resp = await fetch('/api/queue');
    const data = await resp.json();
    productionQueue = data.queue || [];
    currentJob = data.job || null;
    renderQueue();
    if (productionQueue.length > 0) startQueuePolling();
  } catch (e) {}

  // Check for hash-based deep link: #/watch/job-id
  if (isSharedLink) {
    await showPlayerForJob(isSharedLink[1]);
  }
}

init();
</script>
