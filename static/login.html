<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/static/favicon.png">
<title>Baretraks — Sign In</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1a1612;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(180,140,60,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(120,80,30,0.05) 0%, transparent 60%);
    color: #d4c8b0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-container {
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  .logo { width: 120px; margin-bottom: 8px; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4)); }
  .tagline {
    font-size: 0.8rem;
    color: #8a7e6b;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 32px;
  }

  .card {
    background: #231e18;
    border-radius: 16px;
    padding: 32px;
    border: 1px solid #3a3226;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  .card-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.4rem;
    color: #e8d5a3;
    margin-bottom: 24px;
  }

  .form-group {
    margin-bottom: 16px;
    text-align: left;
  }
  .form-group label {
    display: block;
    font-size: 0.8rem;
    color: #8a7e6b;
    margin-bottom: 6px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .form-group input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #4a3f2f;
    background: #1a1612;
    color: #e8d5a3;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input::placeholder { color: #6b6050; }
  .form-group input:focus { border-color: #b48c3c; box-shadow: 0 0 0 2px rgba(180,140,60,0.15); }

  .btn-primary {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #b48c3c;
    color: #1a1612;
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 8px;
  }
  .btn-primary:hover { background: #c99d48; }
  .btn-primary:disabled { background: #4a3f2f; color: #6b6050; cursor: not-allowed; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: #6b6050;
    font-size: 0.8rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #3a3226;
  }

  .btn-google {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #4a3f2f;
    background: transparent;
    color: #d4c8b0;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn-google:hover { background: #2a2520; border-color: #b48c3c; }

  .switch-link {
    margin-top: 20px;
    font-size: 0.85rem;
    color: #8a7e6b;
  }
  .switch-link a {
    color: #b48c3c;
    text-decoration: none;
    font-weight: 600;
  }
  .switch-link a:hover { text-decoration: underline; }

  .error-msg {
    background: rgba(224,112,80,0.1);
    border: 1px solid rgba(224,112,80,0.3);
    color: #e07050;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    margin-bottom: 16px;
    display: none;
  }
</style>
</head>
<body>
<div class="login-container">
  <img src="/static/logo.png" alt="Baretraks" class="logo" />
  <div class="tagline">Strip. Sing. Share.</div>

  <div class="card">
    <h2 class="card-title" id="form-title">Sign In</h2>
    <div class="error-msg" id="error-msg"></div>

    <form id="auth-form" onsubmit="handleSubmit(event)">
      <!-- Name field (only for registration) -->
      <div class="form-group" id="name-group" style="display:none;">
        <label>Name</label>
        <input type="text" id="name-input" placeholder="Your name" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email-input" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password-input" placeholder="Enter password" required minlength="6" />
      </div>

      <button type="submit" class="btn-primary" id="submit-btn">Sign In</button>
    </form>

    <div class="divider">or</div>

    <button class="btn-google" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>

    <div class="switch-link" id="switch-link">
      Don't have an account? <a href="#" onclick="toggleMode(); return false;">Create one</a>
    </div>
  </div>
</div>

<script>
let isRegister = false;

function toggleMode() {
  isRegister = !isRegister;
  document.getElementById('form-title').textContent = isRegister ? 'Create Account' : 'Sign In';
  document.getElementById('name-group').style.display = isRegister ? 'block' : 'none';
  document.getElementById('submit-btn').textContent = isRegister ? 'Create Account' : 'Sign In';
  document.getElementById('switch-link').innerHTML = isRegister
    ? 'Already have an account? <a href="#" onclick="toggleMode(); return false;">Sign in</a>'
    : 'Don\'t have an account? <a href="#" onclick="toggleMode(); return false;">Create one</a>';
  document.getElementById('error-msg').style.display = 'none';
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

async function handleSubmit(e) {
  e.preventDefault();
  const email = document.getElementById('email-input').value.trim();
  const password = document.getElementById('password-input').value;
  const btn = document.getElementById('submit-btn');

  btn.disabled = true;
  document.getElementById('error-msg').style.display = 'none';

  try {
    if (isRegister) {
      const name = document.getElementById('name-input').value.trim();
      if (!name) { showError('Please enter your name.'); return; }
      const resp = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, name, password }),
      });
      if (!resp.ok) {
        const data = await resp.json().catch(() => ({}));
        showError(data.detail || 'Registration failed.');
        return;
      }
    } else {
      const resp = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      if (!resp.ok) {
        const data = await resp.json().catch(() => ({}));
        showError(data.detail || 'Invalid email or password.');
        return;
      }
    }
    window.location.href = '/';
  } catch (err) {
    showError('Network error. Please try again.');
  } finally {
    btn.disabled = false;
  }
}

function googleLogin() {
  window.location.href = '/api/auth/google';
}
</script>
</body>
</html>
